<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; img-src 'self' data: blob: https://i.imgur.com https://raw.githubusercontent.com https://placehold.co https://mwreborn.irunawiki.com; connect-src 'self' https://script.google.com https://script.googleusercontent.com https://api.github.com; font-src 'self' data: https://cdnjs.cloudflare.com;">

    <title>MWR | Formation Builder</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="shared/globals.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="shared/styles.css">
    <link rel="icon" href="https://i.imgur.com/1h28KPo.png" type="image/x-icon">

    <style>
        .type-vip { border-color: #fbbf24; }
        .type-limited { border-color: #c90dde; }
        .type-basic { border-color: #22c55e; }
        .type-normal { border-color: #6b7280; }
        
        .hero-circle { transition: transform 0.1s, box-shadow 0.1s; }
        .hero-circle:hover { transform: scale(1.05); }
        .hero-circle.selected { transform: scale(1.15); box-shadow: 0 0 0 3px rgba(250, 204, 21, 0.8); z-index: 10; }
        
        .grid-cell { transition: background-color 0.2s; }
        .grid-cell:hover { background-color: rgba(255, 255, 255, 0.05); }
        .grid-cell.drag-over { background-color: rgba(99, 102, 241, 0.3); border-color: #6366f1; }
        
        /* NEW: Seamless AOE Layering. It stretches exactly 2px outward to merge across the 4px grid gap */
        .aoe-layer { 
            position: absolute; 
            top: -2px; bottom: -2px; left: -2px; right: -2px; 
            pointer-events: none; 
            z-index: 5; 
        }
        
        .hide-scroll::-webkit-scrollbar { display: none; }
        .hide-scroll { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen flex flex-col font-sans transition-colors duration-300">

    <nav class="bg-gray-800 border-b border-gray-700 sticky top-0 z-40 shadow-xl transition-colors duration-300">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <button onclick="AppMenu.toggleSidebar()" class="text-gray-400 hover:text-white transition-colors outline-none"><i class="fa-solid fa-bars text-xl"></i></button>
                <div class="flex items-center gap-2">
                    <i class="fa-solid fa-chess-board text-blue-400 text-xl"></i>
                    <span class="font-bold text-lg tracking-wide hidden sm:inline">Formation Builder</span>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="app.openLoadModal()" class="px-4 py-1.5 bg-gray-700 hover:bg-gray-600 text-white rounded text-sm font-bold transition-colors border border-gray-600"><i class="fa-solid fa-download mr-1.5 hidden sm:inline"></i>Load</button>
                <button onclick="app.saveFormation()" id="btnSave" class="px-4 py-1.5 bg-blue-600 hover:bg-blue-500 text-white rounded text-sm font-bold shadow-lg transition-colors"><i class="fa-solid fa-share-nodes mr-1.5 hidden sm:inline"></i>Save</button>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex flex-col-reverse md:flex-row max-w-7xl w-full mx-auto p-2 sm:p-4 gap-4 h-[calc(100vh-64px)] overflow-hidden">
        
        <div class="w-full md:w-[45%] lg:w-[40%] flex flex-col bg-gray-800 border border-gray-700 rounded-xl overflow-hidden shadow-lg h-[40vh] md:h-full transition-colors duration-300">
            <div class="p-2 sm:p-3 border-b border-gray-700 bg-gray-900/50 flex flex-col gap-2 flex-shrink-0">
                <input type="text" id="searchInput" onkeyup="app.renderPool()" placeholder="Search heroes..." class="w-full bg-gray-900 text-white rounded px-3 py-1.5 border border-gray-600 text-sm outline-none focus:border-blue-500 transition-colors">
                <div class="flex flex-wrap gap-1 justify-center" id="classFilters"></div>
            </div>
            
            <div id="heroPool" class="flex-grow overflow-y-auto hide-scroll p-3 grid grid-cols-6 sm:grid-cols-6 lg:grid-cols-6 gap-2 content-start">
                <div class="col-span-full text-center text-gray-500 py-10" id="poolLoading"><i class="fas fa-circle-notch fa-spin text-2xl text-blue-500 mb-2"></i><br>Loading Heroes...</div>
            </div>
        </div>

        <div class="w-full md:w-[55%] lg:w-[60%] flex flex-col bg-gray-800 border border-gray-700 rounded-xl p-3 shadow-lg h-[60vh] md:h-full transition-colors duration-300">
            
            <div class="flex justify-between items-end mb-2 flex-shrink-0">
                <p class="text-xs text-gray-400"><span class="hidden sm:inline">Drag & Drop or</span> Tap Hero → Tap Cell</p>
                <div class="text-xs font-bold text-gray-400 bg-gray-900 px-2 py-1 rounded border border-gray-700"><span id="heroCount" class="text-blue-400">0</span> / 30 Placed</div>
            </div>

            <div class="flex flex-col lg:flex-row flex-grow min-h-0 gap-3 w-full relative">
                
                <!-- FIX: Changed overflow-hidden to overflow-visible so auras are not sliced off -->
                <div class="flex-1 min-w-0 min-h-0 flex items-center justify-center py-1 overflow-visible z-10">
                    <div id="boardContainer" class="bg-gray-900 border border-gray-700 p-1.5 rounded-lg grid grid-cols-5 grid-rows-7 gap-[4px] relative h-full shadow-inner" style="aspect-ratio: 5/7; max-width: 100%; max-height: 100%;">
                        <div id="wholeFormationHighlight" class="absolute inset-0 bg-green-500/10 hidden pointer-events-none z-0 rounded-lg"></div>
                        <!-- JS Injected 35 Cells -->
                    </div>
                </div>

                <div class="flex-shrink-0 lg:w-48 bg-gray-900 border border-gray-700 rounded-lg p-2 min-h-[3rem] max-h-[5rem] lg:max-h-none lg:h-full overflow-y-auto hide-scroll flex flex-col z-10">
                        <span class="text-xs text-gray-600 italic">Place buffing heroes to see footprints</span>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <!-- Modal: Share Code -->
    <div id="shareModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
        <div class="bg-gray-800 border border-gray-700 rounded-xl p-6 shadow-2xl w-full max-w-sm text-center">
            <div class="w-16 h-16 bg-green-500/20 rounded-full flex items-center justify-center mx-auto mb-4"><i class="fa-solid fa-check text-3xl text-green-400"></i></div>
            <h3 class="text-xl font-bold text-white mb-2">Formation Saved!</h3>
            <p class="text-sm text-gray-400 mb-4">Share this code with others so they can load your build.</p>
            
            <div class="flex items-center gap-2 bg-gray-900 border border-gray-600 rounded-lg p-2 mb-6">
                <input type="text" id="shareCodeDisplay" readonly class="bg-transparent text-center text-3xl font-black text-blue-400 w-full outline-none tracking-widest" value="XXXXX">
                <button onclick="app.copyCode()" class="bg-gray-700 hover:bg-gray-600 text-white p-3 rounded-lg transition-colors"><i class="fa-solid fa-copy"></i></button>
            </div>
            
            <button onclick="document.getElementById('shareModal').classList.add('hidden')" class="w-full py-2 bg-gray-700 hover:bg-gray-600 text-white font-bold rounded transition-colors">Close</button>
        </div>
    </div>

    <!-- Modal: Load Formation -->
    <div id="loadModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
        <div class="bg-gray-800 border border-gray-700 rounded-xl p-6 shadow-2xl w-full max-w-sm text-center">
            <h3 class="text-xl font-bold text-white mb-2"><i class="fa-solid fa-download text-blue-400 mr-2"></i>Load Formation</h3>
            <p class="text-sm text-gray-400 mb-4">Enter a 5-letter code to view a build.</p>
            
            <input type="text" id="loadCodeInput" placeholder="e.g. X7K9P" maxlength="5" class="w-full bg-gray-900 border border-gray-600 rounded-lg px-4 py-3 text-center text-2xl font-black text-white uppercase tracking-widest mb-4 outline-none focus:border-blue-500">
            <p id="loadError" class="text-red-400 text-sm hidden mb-4 font-bold"></p>

            <div class="flex gap-3">
                <button onclick="document.getElementById('loadModal').classList.add('hidden')" class="flex-1 py-2 bg-gray-700 hover:bg-gray-600 text-white font-bold rounded transition-colors">Cancel</button>
                <button onclick="app.fetchFormation()" id="btnFetch" class="flex-1 py-2 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded transition-colors shadow-lg">Load Data</button>
            </div>
        </div>
    </div>

    <script>
        const app = (() => {
            const { API_URL, CLASS_ICONS } = window.MWR_GLOBALS;
            
            let heroes = [];
            let aoeDB = {}; 
            let placedHeroes = []; 
            let currentFilter = 'All';
            let selectedPoolHero = null;
            let isDragging = false;

            const init = async () => {
                window.AppMenu.build(false, 'blue');
                buildFilters();
                buildGrid();

                try {
                    const [heroRes, aoeRes] = await Promise.all([
                        fetch(API_URL + "?view=all"),
                        fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "get_aoe" }) })
                    ]);

                    heroes = await heroRes.json();
                    const aoeData = await aoeRes.json();
                    
                    if(!aoeData.error && Array.isArray(aoeData)) {
                        aoeData.forEach(entry => { aoeDB[entry.heroId] = entry; });
                    }

                    document.getElementById('poolLoading').classList.add('hidden');
                    renderPool();
                } catch(e) {
                    document.getElementById('poolLoading').innerHTML = `<p class="text-red-400">Database connection failed.</p>`;
                }
            };

            const buildFilters = () => {
                const container = document.getElementById('classFilters');
                container.innerHTML = `<button onclick="app.setFilter('All')" class="px-2 py-1 rounded text-xs font-bold transition-all border border-gray-600 text-white bg-gray-700">All</button>` + 
                Object.keys(CLASS_ICONS).map(cls => 
                    `<button onclick="app.setFilter('${cls}')" class="px-1.5 py-0.5 rounded transition-all border border-gray-600 text-gray-400 hover:text-white bg-gray-800" title="${cls}">
                        <img src="${CLASS_ICONS[cls]}" class="w-4 h-4 sm:w-5 sm:h-5 object-contain inline opacity-80">
                    </button>`
                ).join('');
            };
            const setFilter = (cls) => { currentFilter = cls; renderPool(); };

            const renderPool = () => {
                const search = document.getElementById('searchInput').value.toLowerCase();
                const container = document.getElementById('heroPool');

                const filtered = heroes.filter(h => {
                    const classMatch = currentFilter === 'All' || h.heroClass === currentFilter;
                    const searchMatch = !search || h.name.toLowerCase().includes(search);
                    return classMatch && searchMatch;
                }).sort((a,b) => a.name.localeCompare(b.name));

                container.innerHTML = filtered.map(h => {
                    let typeClass = 'type-normal';
                    if(h.heroType === 'VIP') typeClass = 'type-vip';
                    if(h.heroType === 'Limited') typeClass = 'type-limited';
                    if(h.heroType === 'Basic Limited' || h.heroType === 'Basic Banner') typeClass = 'type-basic';

                    const isSelected = selectedPoolHero === h.id ? 'selected' : '';
                    
                    return `
                        <div onclick="app.selectFromPool('${h.id}')" draggable="true" ondragstart="app.dragStart(event, '${h.id}')" ondragend="app.dragEnd()"
                             class="hero-circle relative w-[42px] h-[42px] sm:w-12 sm:h-12 bg-[#4b5563] rounded-full border-2 ${typeClass} cursor-pointer mx-auto flex-shrink-0 ${isSelected}" title="${h.name}">
                            <img src="${h.image}" onerror="this.src='https://placehold.co/100/4E4F5C/FFFFFF?text=?'" class="w-full h-full object-cover rounded-full opacity-90 pointer-events-none">
                            ${h.hasAwaken === 'Yes' ? '<div class="absolute -bottom-1 -right-1 w-3.5 h-3.5 bg-gray-900 rounded-full flex items-center justify-center border border-gray-600"><i class="fa-solid fa-fire-flame-curved text-[8px] text-red-500"></i></div>' : ''}
                        </div>
                    `;
                }).join('');
            };

            const buildGrid = () => {
                const grid = document.getElementById('boardContainer');
                grid.innerHTML = '';
                
                for(let y = 0; y < 7; y++) {
                    for(let x = 0; x < 5; x++) {
                        const cell = document.createElement('div');
                        cell.className = "grid-cell bg-gray-800 border border-gray-700 rounded relative flex items-center justify-center overflow-visible cursor-pointer";
                        cell.dataset.x = x; cell.dataset.y = y;
                        cell.onclick = () => handleCellClick(x, y);
                        cell.ondragover = (e) => dragOver(e, cell);
                        cell.ondragleave = (e) => dragLeave(e, cell);
                        cell.ondrop = (e) => drop(e, x, y, cell);
                        grid.appendChild(cell);
                    }
                }
            };

            const updateGridVisuals = () => {
                document.querySelectorAll('.grid-cell').forEach(cell => {
                    cell.innerHTML = ''; cell.classList.remove('drag-over');
                });

                // NEW: Solid Seamless Shape Logic
                const aoeMap = {}; 
                
                placedHeroes.forEach(ph => {
                    const conf = aoeDB[ph.id];
                    if(!conf) return;

                    // Fetch Opacity variants
                    const fillCol = generateColor(ph.id, 0.35); // 35% Translucent inside
                    const borderCol = generateColor(ph.id, 0.9); // 90% Solid border
                    
                    const addAoe = (cx, cy) => {
                        if(cx>=0 && cx<5 && cy>=0 && cy<7) {
                            const key = `${cx},${cy}`;
                            if(!aoeMap[key]) aoeMap[key] = [];
                            if (!aoeMap[key].some(a => a.id === ph.id)) {
                                aoeMap[key].push({ id: ph.id, fill: fillCol, border: borderCol });
                            }
                        }
                    };

                    // Support for both Legacy and New Row/Col Data
                    if(conf.wholeRow) { for(let i=0; i<5; i++) addAoe(i, ph.y); }
                    if(conf.wholeCol) { for(let i=0; i<7; i++) addAoe(ph.x, i); }
                    
                    if(conf.fullRows) conf.fullRows.forEach(rOffset => { 
                        const offset = Number(rOffset);
                        for(let i=0; i<5; i++) addAoe(i, ph.y + offset); 
                    });
                    
                    if(conf.fullCols) conf.fullCols.forEach(cOffset => { 
                        const offset = Number(cOffset);
                        for(let i=0; i<7; i++) addAoe(ph.x + offset, i); 
                    });
                    
                    if(conf.wholeFormation) {
                        for(let cx=0; cx<5; cx++) { for(let cy=0; cy<7; cy++) addAoe(cx, cy); }
                    }
                    
                    // FIX: Null-safety check prevents "Cannot read properties of null" crashes
                    if(conf.grid) {
                        conf.grid.forEach(pt => {
                            if (!pt) return;
                            if (Array.isArray(pt)) addAoe(ph.x + Number(pt[1]), ph.y + Number(pt[0]));
                            else addAoe(ph.x + Number(pt.x), ph.y + Number(pt.y));
                        });
                    }

                    // Radius Aura Check
                    if(conf.radius && Number(conf.radius) > 0) {
                        const sizeStr = `calc(${(Number(conf.radius) / 10)} * 200%)`;
                        const cell = document.querySelector(`.grid-cell[data-x="${ph.x}"][data-y="${ph.y}"]`);
                        if (cell) cell.innerHTML += `<div class="aura-circle" style="width: ${sizeStr}; height: ${sizeStr}; border-color: ${borderCol};"></div>`;
                    }
                });

                // Draw merged Layers with perimeter borders
                Object.keys(aoeMap).forEach(key => {
                    const [xStr, yStr] = key.split(',');
                    const x = parseInt(xStr); const y = parseInt(yStr);
                    const cell = document.querySelector(`.grid-cell[data-x="${x}"][data-y="${y}"]`);
                    
                    if(cell) {
                        aoeMap[key].forEach(aoe => {
                            const hasTop = aoeMap[`${x},${y-1}`]?.some(a => a.id === aoe.id);
                            const hasBottom = aoeMap[`${x},${y+1}`]?.some(a => a.id === aoe.id);
                            const hasLeft = aoeMap[`${x-1},${y}`]?.some(a => a.id === aoe.id);
                            const hasRight = aoeMap[`${x+1},${y}`]?.some(a => a.id === aoe.id);
                            
                            let borderClasses = "";
                            let borderStyle = `background-color: ${aoe.fill}; border-color: ${aoe.border};`;

                            // Only draw border on edges missing a neighbor!
                            if (!hasTop) { borderClasses += " border-t-[2px]"; borderStyle += ` border-top-style: dashed;`; }
                            if (!hasBottom) { borderClasses += " border-b-[2px]"; borderStyle += ` border-bottom-style: dashed;`; }
                            if (!hasLeft) { borderClasses += " border-l-[2px]"; borderStyle += ` border-left-style: dashed;`; }
                            if (!hasRight) { borderClasses += " border-r-[2px]"; borderStyle += ` border-right-style: dashed;`; }

                            // Smooth outer corners
                            if (!hasTop && !hasLeft) borderClasses += " rounded-tl-[8px]";
                            if (!hasTop && !hasRight) borderClasses += " rounded-tr-[8px]";
                            if (!hasBottom && !hasLeft) borderClasses += " rounded-bl-[8px]";
                            if (!hasBottom && !hasRight) borderClasses += " rounded-br-[8px]";

                            cell.innerHTML += `<div class="aoe-layer ${borderClasses}" style="${borderStyle}"></div>`;
                        });
                    }
                });

                document.getElementById('heroCount').innerText = placedHeroes.length;
                let activeAoeHeroes = [];

                placedHeroes.forEach(ph => {
                    const cell = document.querySelector(`.grid-cell[data-x="${ph.x}"][data-y="${ph.y}"]`);
                    const heroData = heroes.find(h => h.id === ph.id);
                    if(cell && heroData) {
                        let typeClass = 'type-normal';
                        if(heroData.heroType === 'VIP') typeClass = 'type-vip';
                        if(heroData.heroType === 'Limited') typeClass = 'type-limited';
                        if(heroData.heroType === 'Basic Limited' || heroData.heroType === 'Basic Banner') typeClass = 'type-basic';

                        cell.innerHTML += `
                            <div class="relative w-[85%] aspect-square bg-[#4b5563] rounded-full border-[1.5px] sm:border-2 ${typeClass} z-10 shadow-md flex-shrink-0 flex items-center justify-center" title="Tap to Remove">
                                <img src="${heroData.image}" class="w-full h-full object-cover rounded-full pointer-events-none">
                                <div class="absolute -top-1 -right-1 bg-black/80 rounded-full w-4 h-4 flex items-center justify-center opacity-0 hover:opacity-100 transition-opacity pointer-events-none"><i class="fa-solid fa-times text-[8px] text-red-400"></i></div>
                            </div>
                        `;
                        
                        // Solid color for legend mapping
                        if(aoeDB[ph.id]) activeAoeHeroes.push({ name: heroData.name, color: generateColor(ph.id, 1) });
                    }
                });

                renderLegend(activeAoeHeroes);
            };

            const selectFromPool = (id) => {
                if(selectedPoolHero === id) selectedPoolHero = null; 
                else selectedPoolHero = id;
                renderPool();
            };

            const handleCellClick = (x, y) => {
                if(isDragging) return; 

                const existingIndex = placedHeroes.findIndex(p => p.x === x && p.y === y);
                
                if(existingIndex > -1) {
                    placedHeroes.splice(existingIndex, 1);
                    updateGridVisuals();
                } else if(selectedPoolHero) {
                    if(placedHeroes.length >= 30) return alert("Maximum of 30 heroes allowed on the grid.");
                    placedHeroes.push({ id: selectedPoolHero, x: x, y: y });
                    selectedPoolHero = null; 
                    renderPool();
                    updateGridVisuals();
                }
            };

            const dragStart = (e, id) => { isDragging = true; e.dataTransfer.setData("heroId", id); };
            const dragEnd = () => { isDragging = false; };
            const dragOver = (e, cell) => { e.preventDefault(); cell.classList.add('drag-over'); };
            const dragLeave = (e, cell) => { cell.classList.remove('drag-over'); };
            const drop = (e, x, y, cell) => {
                e.preventDefault(); cell.classList.remove('drag-over'); isDragging = false;
                const id = e.dataTransfer.getData("heroId");
                if(!id || placedHeroes.length >= 30) return;
                
                placedHeroes = placedHeroes.filter(p => !(p.x === x && p.y === y));
                placedHeroes.push({ id, x, y });
                selectedPoolHero = null; renderPool(); updateGridVisuals();
            };

            // HSLA color generator for Translucency
            const generateColor = (id, alpha) => {
                let hash = 0;
                for (let i = 0; i < id.length; i++) hash = id.charCodeAt(i) + ((hash << 5) - hash);
                const h = Math.abs(hash) % 360;
                return `hsla(${h}, 80%, 60%, ${alpha})`; 
            };

            const renderLegend = (active) => {
                const container = document.getElementById('legendContainer');
                if(active.length === 0) {
                    container.innerHTML = '<span class="text-xs text-gray-600 italic">No active auras on board.</span>';
                    return;
                }
                
                const unique = []; const seen = new Set();
                active.forEach(a => { if(!seen.has(a.name)) { seen.add(a.name); unique.push(a); } });

                container.innerHTML = unique.map(a => `
                    <div class="flex items-center gap-1.5 bg-gray-800 border border-gray-700 px-2 py-0.5 rounded">
                        <div class="w-2.5 h-2.5 rounded-full" style="background-color: ${a.color};"></div>
                        <span class="text-[10px] sm:text-xs font-bold text-gray-300">${a.name}</span>
                    </div>
                `).join('');
            };

            const saveFormation = async () => {
                if(placedHeroes.length === 0) return alert("Place at least one hero before saving.");
                const btn = document.getElementById('btnSave');
                const ogHTML = btn.innerHTML;
                btn.innerHTML = `<i class="fas fa-circle-notch fa-spin"></i>`;
                btn.disabled = true;

                try {
                    const res = await fetch(API_URL, {
                        method: "POST",
                        // FIX: Send the raw array directly to prevent double-nesting on the backend
                        body: JSON.stringify({ action: "save_formation", data: placedHeroes }),
                        redirect: "follow"
                    });
                    const data = await res.json();
                    if(data.error) throw new Error(data.error);

                    document.getElementById('shareCodeDisplay').value = data.code;
                    document.getElementById('shareModal').classList.remove('hidden');
                } catch(e) {
                    alert("Failed to save formation.");
                } finally {
                    btn.innerHTML = ogHTML; btn.disabled = false;
                }
            };

            const copyCode = () => {
                const input = document.getElementById('shareCodeDisplay');
                input.select(); input.setSelectionRange(0, 99999); 
                document.execCommand('copy');
                alert("Code copied to clipboard!");
            };

            const openLoadModal = () => {
                document.getElementById('loadError').classList.add('hidden');
                document.getElementById('loadCodeInput').value = '';
                document.getElementById('loadModal').classList.remove('hidden');
            };

            const fetchFormation = async () => {
                const code = document.getElementById('loadCodeInput').value.trim();
                const err = document.getElementById('loadError');
                if(code.length !== 5) { err.innerText = "Code must be 5 characters."; err.classList.remove('hidden'); return; }

                const btn = document.getElementById('btnFetch');
                btn.innerText = "Searching..."; btn.disabled = true;
                err.classList.add('hidden');

                try {
                    const res = await fetch(API_URL, {
                        method: "POST",
                        body: JSON.stringify({ action: "load_formation", code: code }),
                        redirect: "follow"
                    });
                    const data = await res.json();
                    
                    if(data.error) throw new Error(data.error);
                    
                    // FIX: Safely parse both old (double-nested) and new (flat) formation formats
                    let loadedGrid = data.grid;
                    if (loadedGrid && !Array.isArray(loadedGrid) && Array.isArray(loadedGrid.grid)) {
                        loadedGrid = loadedGrid.grid;
                    }
                    placedHeroes = Array.isArray(loadedGrid) ? loadedGrid : [];
                    
                    document.getElementById('loadModal').classList.add('hidden');
                    selectedPoolHero = null;
                    renderPool();
                    updateGridVisuals();
                } catch(e) {
                    err.innerText = e.message;
                    err.classList.remove('hidden');
                } finally {
                    btn.innerText = "Load Data"; btn.disabled = false;
                }
            };
