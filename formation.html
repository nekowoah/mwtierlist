<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MWR | Formation Builder</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="shared/globals.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="shared/styles.css">
    <link rel="icon" href="https://i.imgur.com/1h28KPo.png" type="image/x-icon">

    <style>
        .grid-cell { background-color: #1f2937; border: 1px solid #4b5563; position: relative; transition: border-color 0.2s; }
        .grid-cell:hover { border-color: #60a5fa; z-index: 10; }
        
        /* Drag and Drop Styles */
        .drag-over { border: 2px dashed #3b82f6 !important; background-color: rgba(59, 130, 246, 0.2) !important; }
        .hero-draggable { cursor: grab; }
        .hero-draggable:active { cursor: grabbing; }

        /* Mobile Selected State */
        .cell-selected { border: 2px solid #fbbf24 !important; box-shadow: 0 0 15px rgba(251, 191, 36, 0.5); z-index: 20; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(251, 191, 36, 0); } 100% { box-shadow: 0 0 0 0 rgba(251, 191, 36, 0); } }

        /* Highlighting Logic (Faint overlap colors) */
        .highlight-aoe { position: absolute; inset: 0; background-color: rgba(34, 197, 94, 0.15); pointer-events: none; z-index: 5; }
        
        /* Dynamic Circular Radius Aura */
        .aura-circle { position: absolute; border: 2px solid rgba(234, 179, 8, 0.6); background: transparent; border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; z-index: 4; }

        /* Catalog Unique Placed State */
        .catalog-placed { opacity: 0.3; filter: grayscale(100%); pointer-events: none; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans flex flex-col transition-colors duration-300">

    <nav class="bg-gray-800 border-b border-gray-700 sticky top-0 z-40 shadow-xl transition-colors duration-300">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <button onclick="window.AppMenu.toggleSidebar()" class="text-gray-400 hover:text-white transition-colors outline-none"><i class="fa-solid fa-bars text-xl"></i></button>
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-chess-board text-blue-400 text-xl"></i>
                    <span class="font-bold text-xl tracking-wide hidden sm:block">Formation Builder</span>
                </div>
            </div>
            
            <div class="flex gap-2">
                <button onclick="app.clearBoard()" class="bg-gray-700 hover:bg-gray-600 text-white px-4 py-1.5 rounded-lg text-sm font-bold shadow-lg transition-colors"><i class="fa-solid fa-trash mr-1"></i> Clear</button>
                <button onclick="app.saveFormation()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-1.5 rounded-lg text-sm font-bold shadow-lg transition-colors"><i class="fa-solid fa-floppy-disk mr-1"></i> Save Link</button>
            </div>
        </div>
    </nav>

    <main class="w-full flex-grow flex flex-col md:flex-row h-[calc(100vh-64px)] overflow-hidden">
        
        <!-- Left: Compact Hero Catalog -->
        <div class="w-full md:w-[35%] lg:w-[30%] bg-gray-800 border-r border-gray-700 flex flex-col h-1/3 md:h-full relative z-20 shadow-xl">
            <div class="p-3 bg-gray-900 border-b border-gray-700 shrink-0">
                <div class="relative group">
                    <input type="text" id="searchInput" onkeyup="app.renderCatalog()" placeholder="Search heroes..." class="w-full bg-gray-800 border border-gray-600 rounded-full px-4 py-1.5 pl-9 text-white focus:border-blue-500 outline-none text-sm">
                    <i class="fa-solid fa-search absolute left-3 top-2.5 text-gray-400 text-xs"></i>
                </div>
                <div class="flex items-center gap-2 mt-3 overflow-x-auto hide-scrollbar pb-1" id="classFilterContainer"></div>
                <div class="text-[10px] text-gray-500 mt-2 italic text-center">Drag or Tap heroes to place them. Heroes are unique.</div>
            </div>
            
            <div id="loading" class="flex-grow flex items-center justify-center">
                <i class="fas fa-circle-notch fa-spin text-3xl text-blue-500"></i>
            </div>

            <!-- FIX: Highly dense gap-1 grid for efficient browsing -->
            <div id="heroCatalog" class="flex-grow overflow-y-auto hide-scrollbar p-2 grid grid-cols-5 sm:grid-cols-6 md:grid-cols-4 lg:grid-cols-5 gap-1 content-start hidden"></div>
        </div>

        <!-- Right: Battlefield Grid -->
        <div class="w-full md:w-[65%] lg:w-[70%] bg-[#111827] flex-grow flex flex-col items-center justify-center p-4 relative overflow-y-auto">
            
            <!-- Faint whole formation highlight layer -->
            <div id="wholeFormationHighlight" class="absolute inset-0 bg-green-500/5 hidden pointer-events-none z-0"></div>

            <div class="mb-4 text-center z-10">
                <h3 class="text-lg font-bold text-white tracking-widest uppercase">Enemy Frontline</h3>
                <i class="fa-solid fa-chevron-up text-red-500 animate-bounce mt-1"></i>
            </div>

            <div class="bg-gray-800 p-2 sm:p-4 rounded-xl border-2 border-gray-700 shadow-2xl relative z-10">
                <!-- Grid: 7 Cols x 5 Rows -->
                <div id="battleGrid" class="grid grid-cols-7 gap-1 sm:gap-2">
                    <!-- Injected by JS -->
                </div>
            </div>
            
            <div class="mt-6 text-center text-xs text-gray-500 z-10 max-w-md hidden md:block">
                <p><i class="fa-solid fa-mouse-pointer mr-1"></i> Drag to move or swap heroes. Click to remove.</p>
            </div>
            <div class="mt-4 text-center text-xs text-gray-500 z-10 max-w-md md:hidden">
                <p><i class="fa-solid fa-hand-pointer mr-1"></i> Tap to select, move, or swap. Tap selected again to remove.</p>
            </div>
        </div>
    </main>

    <script>
        const app = (() => {
            const { API_URL, CLASS_ICONS } = window.MWR_GLOBALS;
            
            let heroes = [];
            let aoeData = {}; // Fast dictionary lookup
            let placedHeroes = new Array(35).fill(null);
            
            let currentFilter = 'All';
            let selectedCatalogHeroId = null; // Used for Mobile Tap placements
            let selectedGridIndex = null;     // Used for Mobile Tap swaps

            const init = async () => {
                if (window.AppMenu) window.AppMenu.build(false, 'blue');
                
                const filterContainer = document.getElementById('classFilterContainer');
                let filterHtml = `<button onclick="app.setFilter('All')" class="px-3 py-1 rounded text-xs font-bold border border-gray-600 bg-gray-800 hover:bg-gray-700 text-white shrink-0">All</button>`;
                Object.keys(CLASS_ICONS).forEach(cls => {
                    filterHtml += `<button onclick="app.setFilter('${cls}')" title="${cls}" class="w-8 h-8 rounded border border-gray-600 bg-gray-800 hover:bg-gray-700 p-1 shrink-0 flex items-center justify-center"><img src="${CLASS_ICONS[cls]}" class="w-full h-full object-contain opacity-80"></button>`;
                });
                filterContainer.innerHTML = filterHtml;

                buildGrid();

                try {
                    const res = await fetch(API_URL + "?view=all");
                    heroes = await res.json();
                    heroes.sort((a,b) => a.name.localeCompare(b.name));

                    const aoeRes = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "get_aoe" }) });
                    const aoeRaw = await aoeRes.json() || [];
                    aoeRaw.forEach(a => aoeData[a.heroId] = a);

                    document.getElementById('loading').classList.add('hidden');
                    document.getElementById('heroCatalog').classList.remove('hidden');
                    
                    const urlParams = new URLSearchParams(window.location.search);
                    if(urlParams.has('code')) loadFormation(urlParams.get('code'));
                    else renderAll();

                } catch(e) { alert("Failed to load: " + e.message); }
            };

            const buildGrid = () => {
                const grid = document.getElementById('battleGrid');
                let html = '';
                for (let i = 0; i < 35; i++) {
                    html += `
                        <div id="cell-${i}" class="grid-cell w-12 h-12 sm:w-14 sm:h-14 rounded flex items-center justify-center"
                            ondragover="app.handleDragOver(event)"
                            ondragleave="app.handleDragLeave(event)"
                            ondrop="app.handleDrop(event, ${i})"
                            onclick="app.handleCellClick(${i})">
                            <div id="highlights-${i}" class="absolute inset-0 pointer-events-none z-0"></div>
                            <div id="hero-content-${i}" class="relative w-[95%] h-[95%] z-10 flex items-center justify-center"></div>
                        </div>
                    `;
                }
                grid.innerHTML = html;
            };

            const setFilter = (cls) => { currentFilter = cls; renderCatalog(); };

            const renderAll = () => {
                renderCatalog();
                renderGrid();
            };

            // --- CATALOG LOGIC ---
            const renderCatalog = () => {
                const catalog = document.getElementById('heroCatalog');
                const search = document.getElementById('searchInput').value.toLowerCase();
                
                catalog.innerHTML = heroes.filter(h => {
                    const matchSearch = h.name.toLowerCase().includes(search);
                    const matchClass = currentFilter === 'All' || h.heroClass === currentFilter;
                    return matchSearch && matchClass;
                }).map(h => {
                    const isPlaced = placedHeroes.some(p => p && p.id === h.id);
                    const stateClass = isPlaced ? 'catalog-placed' : '';
                    const selectClass = selectedCatalogHeroId === h.id ? 'ring-2 ring-yellow-400 ring-offset-2 ring-offset-gray-900' : 'border border-gray-700 hover:border-blue-500';
                    
                    return `
                    <div class="relative aspect-square bg-gray-700 rounded overflow-hidden cursor-pointer hero-draggable ${stateClass} ${selectClass}"
                        draggable="${!isPlaced}"
                        ondragstart="app.handleDragStart(event, '${h.id}', null)"
                        onclick="app.selectFromCatalog('${h.id}')"
                        title="${h.name}">
                        <img src="${h.image}" class="w-full h-full object-cover">
                        <div class="absolute bottom-0 w-full bg-black/70 text-center text-[9px] font-bold text-white py-0.5 truncate px-1">${h.name}</div>
                    </div>
                    `;
                }).join('');
            };

            const selectFromCatalog = (id) => {
                const isPlaced = placedHeroes.some(p => p && p.id === id);
                if (isPlaced) return;
                
                if (selectedCatalogHeroId === id) {
                    selectedCatalogHeroId = null; // Toggle off
                } else {
                    selectedCatalogHeroId = id;
                    selectedGridIndex = null; // Clear grid selection
                }
                renderCatalog();
                renderGrid();
            };

            // --- DRAG & DROP LOGIC (DESKTOP) ---
            const handleDragStart = (e, heroId, sourceIndex) => {
                e.dataTransfer.setData('text/plain', JSON.stringify({ heroId, sourceIndex }));
                selectedCatalogHeroId = null; 
                selectedGridIndex = null;
                renderCatalog(); renderGrid();
            };

            const handleDragOver = (e) => { e.preventDefault(); e.currentTarget.classList.add('drag-over'); };
            const handleDragLeave = (e) => { e.currentTarget.classList.remove('drag-over'); };

            const handleDrop = (e, targetIndex) => {
                e.preventDefault();
                e.currentTarget.classList.remove('drag-over');
                
                const dataStr = e.dataTransfer.getData('text/plain');
                if (!dataStr) return;
                
                const { heroId, sourceIndex } = JSON.parse(dataStr);

                if (sourceIndex !== null && sourceIndex !== undefined) {
                    // Swap logic on grid
                    const temp = placedHeroes[targetIndex];
                    placedHeroes[targetIndex] = placedHeroes[sourceIndex];
                    placedHeroes[sourceIndex] = temp;
                } else {
                    // Placed from catalog
                    const oldIdx = placedHeroes.findIndex(h => h && h.id === heroId);
                    if (oldIdx !== -1) placedHeroes[oldIdx] = null; // Enforce unique placement
                    
                    placedHeroes[targetIndex] = heroes.find(h => h.id === heroId);
                }
                renderAll();
            };

            // --- TAP & SWAP LOGIC (MOBILE & CLICKS) ---
            const handleCellClick = (targetIndex) => {
                const targetHero = placedHeroes[targetIndex];

                if (selectedCatalogHeroId) {
                    // Place selected hero from catalog into this cell
                    const oldIdx = placedHeroes.findIndex(h => h && h.id === selectedCatalogHeroId);
                    if (oldIdx !== -1) placedHeroes[oldIdx] = null; 
                    
                    placedHeroes[targetIndex] = heroes.find(h => h.id === selectedCatalogHeroId);
                    selectedCatalogHeroId = null;
                } 
                else if (selectedGridIndex !== null) {
                    // Swapping or Removing
                    if (selectedGridIndex === targetIndex) {
                        placedHeroes[targetIndex] = null; // Tap same cell = Remove
                    } else {
                        const temp = placedHeroes[targetIndex];
                        placedHeroes[targetIndex] = placedHeroes[selectedGridIndex];
                        placedHeroes[selectedGridIndex] = temp; // Swap
                    }
                    selectedGridIndex = null;
                } 
                else if (targetHero) {
                    // Select hero already on board
                    selectedGridIndex = targetIndex;
                }
                renderAll();
            };

            // --- BATTLEFIELD RENDERING & AOE MATH ---
            const renderGrid = () => {
                // Clear all highlights
                for (let i = 0; i < 35; i++) {
                    document.getElementById(`highlights-${i}`).innerHTML = '';
                    document.getElementById(`hero-content-${i}`).innerHTML = '';
                    document.getElementById(`cell-${i}`).classList.remove('cell-selected');
                }
                
                let isWholeFormationActive = false;
                const highlightCounts = new Array(35).fill(0); // Track overlap density

                placedHeroes.forEach((hero, index) => {
                    if (!hero) return;
                    
                    // Render Hero Portrait
                    const contentDiv = document.getElementById(`hero-content-${index}`);
                    const isSelected = selectedGridIndex === index;
                    if (isSelected) document.getElementById(`cell-${index}`).classList.add('cell-selected');

                    contentDiv.innerHTML = `
                        <div class="w-full h-full relative rounded overflow-hidden hero-draggable shadow-md ${isSelected ? 'ring-2 ring-yellow-400' : 'border border-gray-600'}"
                            draggable="true" ondragstart="app.handleDragStart(event, '${hero.id}', ${index})">
                            <img src="${hero.image}" class="w-full h-full object-cover pointer-events-none">
                            <div class="absolute bottom-0 w-full bg-black/70 text-[8px] font-bold text-white text-center truncate pointer-events-none px-0.5 py-[1px]">${hero.name}</div>
                        </div>
                    `;

                    // Calculate AOE Math
                    const aoe = aoeData[hero.id];
                    if (!aoe) return;

                    if (aoe.wholeFormation) isWholeFormationActive = true;

                    const hX = index % 7;
                    const hY = Math.floor(index / 7);

                    // 1. Grid Cells
                    if (aoe.grid) {
                        aoe.grid.forEach(offset => {
                            const tX = hX + offset[1]; const tY = hY + offset[0];
                            if (tX >= 0 && tX < 7 && tY >= 0 && tY < 5) {
                                highlightCounts[tY * 7 + tX]++;
                            }
                        });
                    }

                    // 2. Full Rows (Relative to hero)
                    if (aoe.fullRows) {
                        aoe.fullRows.forEach(rOffset => {
                            const tY = hY + rOffset;
                            if (tY >= 0 && tY < 5) {
                                for(let x=0; x<7; x++) highlightCounts[tY * 7 + x]++;
                            }
                        });
                    }

                    // 3. Full Cols (Relative to hero)
                    if (aoe.fullCols) {
                        aoe.fullCols.forEach(cOffset => {
                            const tX = hX + cOffset;
                            if (tX >= 0 && tX < 7) {
                                for(let y=0; y<5; y++) highlightCounts[y * 7 + tX]++;
                            }
                        });
                    }

                    // 4. Circular Radius Render
                    if (aoe.radius && aoe.radius > 0) {
                        // Radius of 10 = 1 grid space (width + gap). 
                        // Width of aura circle = 2 * radius spaces.
                        // 1 cell width = 100%. 2 cells = 200%.
                        // calc((radius / 10) * 200%)
                        const sizeStr = `calc(${(aoe.radius / 10)} * 200%)`;
                        const auraHtml = `<div class="aura-circle" style="width: ${sizeStr}; height: ${sizeStr};"></div>`;
                        // Inject into the highlights container so it sits behind the hero portrait
                        document.getElementById(`highlights-${index}`).insertAdjacentHTML('beforeend', auraHtml);
                    }
                });

                // Apply Cell Highlights
                for (let i = 0; i < 35; i++) {
                    if (highlightCounts[i] > 0) {
                        const cellHighlight = document.getElementById(`highlights-${i}`);
                        // Cap opacity so it doesn't turn pure white
                        const opacity = Math.min(0.8, highlightCounts[i] * 0.15); 
                        cellHighlight.insertAdjacentHTML('beforeend', `<div class="highlight-aoe" style="background-color: rgba(34, 197, 94, ${opacity});"></div>`);
                    }
                }

                // Global Backdrop Highlight
                const formationBg = document.getElementById('wholeFormationHighlight');
                if (isWholeFormationActive) formationBg.classList.remove('hidden');
                else formationBg.classList.add('hidden');
            };

            const clearBoard = () => {
                if(!confirm("Clear entire formation?")) return;
                placedHeroes.fill(null);
                selectedCatalogHeroId = null; selectedGridIndex = null;
                renderAll();
            };

            const saveFormation = async () => {
                if (placedHeroes.every(h => h === null)) return alert("Board is empty!");
                const payload = placedHeroes.map(h => h ? h.id : null);
                
                try {
                    const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "save_formation", data: payload }) });
                    const data = await res.json();
                    if(data.success) {
                        const url = window.location.href.split('?')[0] + "?code=" + data.code;
                        navigator.clipboard.writeText(url);
                        alert("Formation saved! Shareable Link copied to clipboard.\n" + url);
                    }
                } catch(e) { alert("Failed to save: " + e.message); }
            };

            const loadFormation = async (code) => {
                try {
                    const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "load_formation", code: code }) });
                    const data = await res.json();
                    if(data.error) throw new Error(data.error);
                    
                    placedHeroes = data.grid.map(id => id ? heroes.find(h => h.id === id) || null : null);
                    renderAll();
                } catch(e) { alert("Could not load formation: " + e.message); renderAll(); }
            };

            return { init, setFilter, renderCatalog, handleDragStart, handleDragOver, handleDragLeave, handleDrop, handleCellClick, selectFromCatalog, clearBoard, saveFormation };
        })();
        window.onload = app.init;
    </script>
</body>
</html>
