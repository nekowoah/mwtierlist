<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://cdn.quilljs.com https://cdn.jsdelivr.net https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.quilljs.com https://cdn.jsdelivr.net; img-src 'self' data: blob: https://i.imgur.com https://raw.githubusercontent.com https://placehold.co https://mwreborn.irunawiki.com; connect-src 'self' https://script.google.com https://script.googleusercontent.com https://api.github.com https://firestore.googleapis.com https://*.firebaseio.com https://www.gstatic.com; font-src 'self' data: https://cdnjs.cloudflare.com;">

    <title>MWR Guides & Information</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script src="shared/globals.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="shared/styles.css">
    <link rel="icon" href="https://i.imgur.com/1h28KPo.png" type="image/x-icon">

    <style>
        .ql-editor { color: #d1d5db; font-family: inherit; font-size: 0.95rem; line-height: 1.6; }
        .ql-editor h1 { color: #60a5fa; font-weight: 900; font-size: 1.75rem; margin-bottom: 0.5rem; }
        .ql-editor h2 { color: #93c5fd; font-weight: 800; font-size: 1.5rem; margin-bottom: 0.5rem; }
        .ql-editor h3 { color: #bfdbfe; font-weight: 700; font-size: 1.25rem; margin-bottom: 0.5rem; }
        .ql-editor a { color: #60a5fa; text-decoration: underline; }
        .ql-editor ul, .ql-editor ol { padding-left: 1.5rem; margin-bottom: 1rem; }
        .ql-editor li { padding-bottom: 0.25rem; }
        .ql-toolbar.ql-snow { background-color: #1f2937; border-color: #374151; border-top-left-radius: 0.5rem; border-top-right-radius: 0.5rem; }
        .ql-container.ql-snow { border-color: #374151; border-bottom-left-radius: 0.5rem; border-bottom-right-radius: 0.5rem; }
        .ql-snow .ql-stroke { stroke: #9ca3af; }
        .ql-snow .ql-fill, .ql-snow .ql-stroke.ql-fill { fill: #9ca3af; }
        .ql-snow .ql-picker { color: #9ca3af; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans flex flex-col transition-colors duration-300">

    <nav class="bg-gray-800 border-b border-gray-700 sticky top-0 z-40 shadow-xl transition-colors duration-300">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <button onclick="app.toggleSidebar()" class="text-gray-400 hover:text-white transition-colors outline-none">
                    <i class="fa-solid fa-bars text-xl"></i>
                </button>
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-book-open text-blue-400 text-xl"></i>
                    <span class="font-bold text-xl tracking-wide hidden sm:block" id="siteTitleText">MWR Information</span>
                </div>
            </div>
            
            <div class="flex items-center gap-4" id="navControls">
                <a href="https://dsc.gg/legion-mw" id="discordLink" target="_blank" class="bg-[#5865F2] hover:bg-[#4752C4] text-white p-1.5 rounded-full transition-colors w-9 h-9 flex items-center justify-center shadow-lg" title="Join our Discord">
                    <i class="fa-brands fa-discord text-base"></i>
                </a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8 w-full flex-grow flex flex-col">
        
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
            <div>
                <h1 class="text-3xl sm:text-4xl font-black text-white mb-1 tracking-tight">Guides & Knowledge</h1>
                <p class="text-gray-400 text-sm">Strategies, patch notes, and comprehensive game mechanics.</p>
            </div>
            
            <!-- Layout Toggles and Search -->
            <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
                <div class="flex bg-gray-800 rounded-lg p-1 shrink-0 h-[42px] border border-gray-700">
                    <button onclick="app.setView('grid')" id="view-grid" class="px-4 rounded-md text-white bg-gray-600 shadow-md transition-colors" title="Grid View"><i class="fa-solid fa-border-all"></i></button>
                    <button onclick="app.setView('list')" id="view-list" class="px-4 rounded-md text-gray-400 hover:text-white transition-colors" title="List View"><i class="fa-solid fa-list"></i></button>
                </div>
                <div class="relative w-full sm:w-64 group h-[42px]">
                    <input type="text" id="searchInput" onkeyup="app.render()" placeholder="Search titles or content..." 
                        class="w-full h-full bg-gray-800 border border-gray-600 rounded-lg px-4 pl-10 text-white focus:border-blue-500 outline-none transition-colors shadow-inner">
                    <i class="fa-solid fa-search absolute left-3.5 top-3.5 text-gray-400 group-focus-within:text-blue-500 transition-colors"></i>
                </div>
            </div>
        </div>

        <div id="loading" class="text-center py-16 flex-grow">
            <i class="fas fa-circle-notch fa-spin text-4xl text-blue-500 mb-3"></i>
            <p class="text-gray-500 text-sm animate-pulse">Loading Library...</p>
        </div>

        <!-- Dynamic Containers -->
        <div id="articleGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 sm:gap-4 flex-grow opacity-0 transition-opacity duration-500"></div>
        <div id="articleList" class="hidden flex-col gap-2 flex-grow opacity-0 transition-opacity duration-500"></div>

    </main>

    <footer class="bg-gray-800 border-t border-gray-700 py-6 text-center text-gray-500 text-sm mt-auto">
        <p>MWR Information Archive! Built by the Legion Community</p>
    </footer>

    <!-- Read Article Modal -->
    <div id="viewModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-2 sm:p-4">
        <div class="absolute inset-0 bg-black/90 backdrop-blur-sm transition-opacity" onclick="app.closeModal('viewModal')"></div>
        <div class="relative bg-gray-800 border border-gray-600 rounded-xl shadow-2xl w-full max-w-4xl h-[90vh] md:h-[85vh] overflow-hidden flex flex-col fade-in">
            <div id="viewModalBanner" class="h-40 sm:h-56 w-full bg-gray-900 relative flex-shrink-0 border-b border-gray-700 hidden">
                <img id="viewModalImage" src="" class="w-full h-full object-cover opacity-60">
                <div class="absolute inset-0 bg-gradient-to-t from-gray-900 to-transparent"></div>
            </div>
            <div class="p-6 sm:p-8 flex-grow overflow-y-auto hide-scrollbar relative">
                <button onclick="app.closeModal('viewModal')" class="absolute top-4 right-4 bg-black/50 hover:bg-black text-gray-300 hover:text-white w-8 h-8 rounded-full flex items-center justify-center transition-colors z-20 shadow-lg"><i class="fa-solid fa-xmark"></i></button>
                <h2 id="viewModalTitle" class="text-2xl sm:text-4xl font-black text-white mb-2 pr-10 tracking-tight leading-tight"></h2>
                <div id="viewModalDate" class="text-xs text-blue-400 font-bold mb-6 tracking-wide"></div>
                <div id="viewModalContent" class="ql-editor p-0 bg-transparent border-0"></div>
            </div>
        </div>
    </div>

    <!-- Admin Edit Modal -->
    <div id="editModal" class="fixed inset-0 z-50 hidden flex items-center justify-center p-2 sm:p-4">
        <div class="absolute inset-0 bg-black/90 backdrop-blur-sm transition-opacity" onclick="app.closeModal('editModal')"></div>
        <div class="relative bg-gray-800 border border-gray-600 rounded-xl shadow-2xl w-full max-w-5xl h-[95vh] md:h-[90vh] flex flex-col fade-in">
            <div class="p-4 border-b border-gray-700 flex justify-between items-center bg-gray-900 rounded-t-xl shrink-0">
                <h2 class="text-xl font-bold text-blue-400 flex items-center gap-2"><i class="fa-solid fa-pen-nib"></i> <span id="editModalTitle">Edit Guide</span></h2>
                <button onclick="app.closeModal('editModal')" class="text-gray-400 hover:text-white transition-colors"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <form onsubmit="event.preventDefault(); app.saveArticle();" class="flex flex-col flex-grow p-4 sm:p-6 overflow-hidden gap-4">
                <input type="hidden" id="articleId">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 shrink-0">
                    <div>
                        <label class="text-xs text-gray-400 uppercase font-bold block mb-1">Title</label>
                        <input type="text" id="articleTitle" required class="bg-gray-900 border border-gray-600 rounded px-4 py-2 w-full focus:border-blue-500 outline-none text-white font-bold transition-colors">
                    </div>
                    <div>
                        <label class="text-xs text-gray-400 uppercase font-bold block mb-1">Banner Image URL (Optional)</label>
                        <div class="flex gap-2">
                            <input type="url" id="articleImage" placeholder="https://..." class="bg-gray-900 border border-gray-600 rounded px-4 py-2 w-full focus:border-blue-500 outline-none text-white transition-colors">
                            <button type="button" onclick="app.openImageGallery()" class="bg-gray-700 hover:bg-gray-600 text-white px-3 rounded border border-gray-600 transition-colors shadow-sm" title="Select Image from Gallery"><i class="fa-solid fa-images"></i></button>
                            <label class="bg-gray-700 hover:bg-gray-600 text-white px-3 flex items-center justify-center rounded border border-gray-600 transition-colors shadow-sm cursor-pointer" title="Upload to GitHub (Auto WebP)">
                                <i class="fa-solid fa-upload"></i>
                                <input type="file" accept="image/*" class="hidden" onchange="app.uploadImage(event)">
                            </label>
                        </div>
                    </div>
                    <!-- NEW: Pin Checkbox -->
                    <div class="col-span-1 md:col-span-2 flex items-center gap-2 mt-1 mb-2">
                        <input type="checkbox" id="articlePinned" class="w-4 h-4 accent-blue-500 bg-gray-900 border-gray-600 rounded cursor-pointer">
                        <label for="articlePinned" class="text-sm font-bold text-gray-300 cursor-pointer hover:text-white transition-colors"><i class="fa-solid fa-thumbtack text-red-500 mr-1.5"></i> Pin to Top</label>
                    </div>
                </div>
                <div class="flex-grow flex flex-col min-h-[300px]">
                    <label class="text-xs text-gray-400 uppercase font-bold block mb-1 flex justify-between">
                        <span>Content Editor</span>
                        <span class="text-yellow-500 font-normal italic text-[10px]"><i class="fa-solid fa-triangle-exclamation mr-1"></i>Avoid pasting raw images; use URLs if possible.</span>
                    </label>
                    <div id="quillEditorContainer" class="bg-gray-900 text-white flex-grow rounded-b-lg overflow-hidden border-t-0"></div>
                </div>
                <div class="flex justify-between items-center shrink-0 pt-4 border-t border-gray-700 mt-2">
                    <button type="button" id="btnDelete" onclick="app.deleteArticle()" class="text-red-400 hover:text-red-300 text-sm font-bold transition-colors hidden"><i class="fa-solid fa-trash mr-1"></i>Delete Guide</button>
                    <div class="flex gap-3 ml-auto">
                        <button type="button" onclick="app.closeModal('editModal')" class="px-5 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-white font-bold transition-colors shadow-lg">Cancel</button>
                        <button type="submit" id="btnSave" class="px-6 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg text-white font-bold transition-colors shadow-lg flex items-center gap-2"><i class="fa-solid fa-cloud-arrow-up"></i> Save Post</button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <script>
        const app = (() => {
            const { API_URL, db } = window.MWR_GLOBALS;
            
            let articles = [];
            let isAdmin = false;
            let authToken = "";
            let quillEditor = null;
            let currentView = 'grid';
            let galleryCache = [];

            const toggleSidebar = () => { if (window.AppMenu && window.AppMenu.toggleSidebar) window.AppMenu.toggleSidebar(); };

            const setView = (view) => {
                currentView = view;
                const gridBtn = document.getElementById('view-grid');
                const listBtn = document.getElementById('view-list');
                const gridContainer = document.getElementById('articleGrid');
                const listContainer = document.getElementById('articleList');

                if (view === 'grid') {
                    gridBtn.className = "px-4 rounded-md text-white bg-gray-600 shadow-md transition-colors";
                    listBtn.className = "px-4 rounded-md text-gray-400 hover:text-white transition-colors";
                    gridContainer.classList.remove('hidden'); listContainer.classList.add('hidden');
                    setTimeout(() => gridContainer.classList.remove('opacity-0'), 10);
                } else {
                    listBtn.className = "px-4 rounded-md text-white bg-gray-600 shadow-md transition-colors";
                    gridBtn.className = "px-4 rounded-md text-gray-400 hover:text-white transition-colors";
                    listContainer.classList.remove('hidden'); gridContainer.classList.add('hidden');
                    setTimeout(() => listContainer.classList.remove('opacity-0'), 10);
                }
                render();
            };

            const init = async () => {
                if (window.location.hash === '#admin') {
                    const savedToken = localStorage.getItem('mw_admin_token') || sessionStorage.getItem('mw_admin_token');
                    if (savedToken) {
                        isAdmin = true;
                        authToken = savedToken;
                        document.getElementById('siteTitleText').innerText = "Editor Mode";
                        document.getElementById('discordLink').classList.add('hidden');
                        document.getElementById('navControls').insertAdjacentHTML('afterbegin', `
                            <button onclick="app.openEditModal()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-1.5 rounded-lg transition-colors font-bold shadow-lg flex items-center gap-2">
                                <i class="fa-solid fa-plus"></i><span class="hidden sm:inline">Add Guide</span>
                            </button>
                        `);
                    } else { window.location.href = 'admin.html'; return; }
                }

                if (window.AppMenu && window.AppMenu.build) window.AppMenu.build(isAdmin, 'blue');

                try {
                    quillEditor = new Quill('#quillEditorContainer', {
                        theme: 'snow',
                        placeholder: 'Write your comprehensive guide here...',
                        modules: {
                            toolbar: [
                                [{ 'header': [1, 2, 3, false] }],
                                ['bold', 'italic', 'underline', 'strike'],
                                [{ 'color': [] }, { 'background': [] }],
                                [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                                ['link', 'image', 'video'],
                                ['clean']
                            ]
                        }
                    });
                } catch(e) { console.warn("Text Editor CDN blocked by CSP. Editor disabled.", e); }

                const CACHE_KEY = 'mwr_info_data';
                const TIME_KEY = 'mwr_info_timestamp';
                const CHECK_KEY = 'mwr_info_lastcheck';
                const cachedData = localStorage.getItem(CACHE_KEY);
                const localTimestamp = localStorage.getItem(TIME_KEY);
                const lastCheck = localStorage.getItem(CHECK_KEY);
                const now = Date.now();
                
                if (cachedData) {
                    try {
                        const parsedCache = JSON.parse(cachedData);
                        if (Array.isArray(parsedCache)) {
                            articles = parsedCache;
                            document.getElementById('loading').classList.add('hidden');
                            document.getElementById(currentView === 'grid' ? 'articleGrid' : 'articleList').classList.remove('opacity-0');
                            render();
                        }
                    } catch(e) { console.warn("Cache parse error"); }
                }

                try {
                    let freshData = null;
                    const shouldCheck = !lastCheck || (now - parseInt(lastCheck)) > 120000;
                    
                    if (shouldCheck) {
                        try {
                            if (db) {
                                const metaRef = await db.collection('cache').doc('info_meta').get();
                                if (metaRef.exists) {
                                    const liveTimestamp = metaRef.data().lastUpdated;
                                    localStorage.setItem(CHECK_KEY, now.toString()); // Update check time

                                    if (!localTimestamp || liveTimestamp !== localTimestamp) {
                                        const docRef = await db.collection('cache').doc('info_payload').get();
                                        if (docRef.exists) {
                                            const payloadData = docRef.data();
                                            if (payloadData && payloadData.data) {
                                                const parsed = JSON.parse(payloadData.data);
                                                if (Array.isArray(parsed)) {
                                                    freshData = parsed;
                                                    localStorage.setItem(TIME_KEY, liveTimestamp);
                                                    console.log("🔥 Info Guides loaded instantly from Firebase CDN!");
                                                }
                                            }
                                        }
                                    } else {
                                        console.log("⚡ Local info cache is perfectly up to date! Skipped Firebase payload download.");
                                    }
                                }
                            }
                        } catch (fbErr) { console.warn("Firebase fetch failed. Falling back to GAS.", fbErr); }
                    } else {
                        console.log("⏳ Rate limited: Skipping Firebase info update check to prevent spam.");
                    }

                    if (!freshData && (!cachedData || articles.length === 0)) {
                        const res = await fetch(API_URL + "?view=info", { redirect: "follow" });
                        const gasData = await res.json();
                        if (Array.isArray(gasData)) freshData = gasData;
                        else if (gasData && Array.isArray(gasData.data)) freshData = gasData.data;
                        else throw new Error("Invalid format received from Google Apps Script.");
                    }
                    
                    if (freshData) {
                        articles = Array.isArray(freshData) ? freshData : [];
                        localStorage.setItem(CACHE_KEY, JSON.stringify(articles));
                        
                        document.getElementById('loading').classList.add('hidden');
                        document.getElementById(currentView === 'grid' ? 'articleGrid' : 'articleList').classList.remove('opacity-0');
                        render();
                    }
                    
                } catch(e) { 
                    if (!cachedData || articles.length === 0) {
                        document.getElementById('loading').innerHTML = `<p class="text-red-400 font-bold mb-2">Failed to load guides.</p><p class="text-xs text-gray-500">${e.message}</p>`; 
                    }
                }
            };

            const stripHtml = (html) => {
                let tmp = document.createElement("DIV"); tmp.innerHTML = html;
                return tmp.textContent || tmp.innerText || "";
            };

            const formatDate = (isoString) => {
                if (!isoString) return "";
                try {
                    const d = new Date(isoString);
                    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
                } catch(e) { return ""; }
            };

            const render = () => {
                const grid = document.getElementById('articleGrid');
                const list = document.getElementById('articleList');
                const filterSearch = document.getElementById('searchInput').value.toLowerCase();
                
                grid.innerHTML = ''; list.innerHTML = '';

                const filtered = articles.filter(art => {
                    const searchMatchTitle = (art.title || "").toLowerCase().includes(filterSearch);
                    const rawContent = stripHtml(art.content || "").toLowerCase();
                    const searchMatchContent = rawContent.includes(filterSearch);
                    return searchMatchTitle || searchMatchContent;
                }).sort((a, b) => {
                    if (a.isPinned && !b.isPinned) return -1;
                    if (!a.isPinned && b.isPinned) return 1;
                    return new Date(b.lastUpdate || 0) > new Date(a.lastUpdate || 0) ? 1 : -1;
                });

                if (filtered.length === 0) {
                    const emptyMsg = `<div class="col-span-full text-center text-gray-500 py-10 w-full">No guides match your search.</div>`;
                    grid.innerHTML = emptyMsg; list.innerHTML = emptyMsg;
                    return;
                }

                grid.innerHTML = filtered.map(art => {
                    let adminControls = '';
                    if (isAdmin) {
                        adminControls = `<button onclick="event.stopPropagation(); app.openEditModal('${art.id}')" class="absolute top-2 right-2 bg-yellow-600/90 hover:bg-yellow-500 text-white w-7 h-7 rounded shadow-lg z-20 flex items-center justify-center backdrop-blur-sm transition-colors"><i class="fa-solid fa-pen text-[10px]"></i></button>`;
                    }

                    const pinHtml = art.isPinned ? `<div class="absolute -top-2.5 -left-2.5 bg-gray-900/90 text-red-500 w-8 h-8 rounded-full shadow-[0_4px_10px_rgba(0,0,0,0.5)] z-20 flex items-center justify-center backdrop-blur-sm border border-gray-700/50" title="Pinned Post"><i class="fa-solid fa-thumbtack text-xs"></i></div>` : '';

                    const bannerHtml = art.image 
                        ? `<div class="h-24 sm:h-28 bg-gray-900 relative overflow-hidden shrink-0 rounded-t-xl"><img src="${art.image}" class="w-full h-full object-cover opacity-70 group-hover:opacity-100 group-hover:scale-105 transition-all duration-500"></div>`
                        : `<div class="h-1 bg-blue-600 shrink-0 rounded-t-xl"></div>`;
                    
                    const dateStr = formatDate(art.lastUpdate);

                    return `
                    <div onclick="app.viewArticle('${art.id}')" class="bg-gray-800 border border-gray-700 rounded-xl shadow-lg hover:border-blue-500 hover:shadow-[0_0_15px_rgba(59,130,246,0.3)] transition-all cursor-pointer group flex flex-col h-[160px] sm:h-[180px] relative">
                        ${adminControls}
                        ${pinHtml}
                        ${bannerHtml}
                        <div class="p-3 flex-grow flex flex-col relative items-center justify-start text-center">
                            <h3 class="text-sm font-bold text-white mb-1 line-clamp-3 leading-snug group-hover:text-blue-400 transition-colors w-full px-1">${art.title}</h3>
                            <div class="absolute bottom-2 right-3 text-[9px] sm:text-[10px] text-gray-500 font-bold bg-gray-900/80 px-2 py-0.5 rounded border border-gray-700/50">${dateStr}</div>
                        </div>
                    </div>
                    `;
                }).join('');

                list.innerHTML = filtered.map(art => {
                    let adminControls = '';
                    if (isAdmin) {
                        adminControls = `<button onclick="event.stopPropagation(); app.openEditModal('${art.id}')" class="bg-yellow-600/90 hover:bg-yellow-500 text-white w-7 h-7 rounded shadow-md z-20 flex items-center justify-center transition-colors shrink-0 ml-3"><i class="fa-solid fa-pen text-[10px]"></i></button>`;
                    }
                    const dateStr = formatDate(art.lastUpdate);
                    const pinIcon = art.isPinned ? `<i class="fa-solid fa-thumbtack text-red-500 mr-2" title="Pinned"></i>` : '';

                    return `
                    <div onclick="app.viewArticle('${art.id}')" class="bg-gray-800 border border-gray-700 rounded-lg p-3 sm:p-4 hover:bg-gray-750 hover:border-blue-500 transition-colors cursor-pointer group flex justify-between items-center relative shadow-sm">
                        <div class="flex items-center gap-3 overflow-hidden pr-4">
                            <i class="fa-regular fa-file-lines text-blue-400 text-lg sm:text-xl group-hover:text-blue-300 shrink-0"></i>
                            <h3 class="text-sm sm:text-base font-bold text-white group-hover:text-blue-400 transition-colors truncate">${pinIcon}${art.title}</h3>
                        </div>
                        <div class="flex items-center shrink-0">
                            <div class="text-[10px] sm:text-xs text-gray-400 font-bold whitespace-nowrap bg-gray-900/50 px-2 py-1 rounded border border-gray-700/50">${dateStr}</div>
                            ${adminControls}
                        </div>
                    </div>
                    `;
                }).join('');
            };

            const viewArticle = (id) => {
                const art = articles.find(a => a.id === id);
                if (!art) return;

                document.getElementById('viewModalTitle').innerText = art.title;
                
                const dateEl = document.getElementById('viewModalDate');
                const dateStr = formatDate(art.lastUpdate);
                if (dateStr) { dateEl.innerText = "Updated: " + dateStr; dateEl.classList.remove('hidden'); }
                else { dateEl.classList.add('hidden'); }

                document.getElementById('viewModalContent').innerHTML = art.content || "<p class='italic text-gray-500'>This guide is empty.</p>";
                
                const banner = document.getElementById('viewModalBanner');
                if (art.image) {
                    document.getElementById('viewModalImage').src = art.image;
                    banner.classList.remove('hidden');
                } else { banner.classList.add('hidden'); }

                document.getElementById('viewModal').classList.remove('hidden');
            };

            const openEditModal = (id = null) => {
                if (!isAdmin || !quillEditor) return;
                const modal = document.getElementById('editModal');
                const btnDelete = document.getElementById('btnDelete');
                
                if (id) {
                    const art = articles.find(a => a.id === id);
                    if (!art) return;
                    document.getElementById('editModalTitle').innerText = "Edit Guide";
                    document.getElementById('articleId').value = art.id;
                    document.getElementById('articleTitle').value = art.title;
                    document.getElementById('articleImage').value = art.image || "";
                    document.getElementById('articlePinned').checked = art.isPinned === true;
                    quillEditor.root.innerHTML = art.content || "";
                    btnDelete.classList.remove('hidden');
                } else {
                    document.getElementById('editModalTitle').innerText = "Create New Guide";
                    document.getElementById('articleId').value = "";
                    document.getElementById('articleTitle').value = "";
                    document.getElementById('articleImage').value = "";
                    document.getElementById('articlePinned').checked = false;
                    quillEditor.root.innerHTML = "";
                    btnDelete.classList.add('hidden');
                }
                modal.classList.remove('hidden');
            };

            const closeModal = (modalId) => document.getElementById(modalId).classList.add('hidden');

            const saveArticle = async () => {
                if (!isAdmin || !quillEditor) return;
                const btn = document.getElementById('btnSave');
                btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Saving...`; btn.disabled = true;

                const formData = {
                    id: document.getElementById('articleId').value || "temp_" + Date.now(),
                    title: document.getElementById('articleTitle').value,
                    image: document.getElementById('articleImage').value,
                    isPinned: document.getElementById('articlePinned').checked,
                    content: quillEditor.root.innerHTML,
                    lastUpdate: new Date().toISOString()
                };

                const existingIndex = articles.findIndex(a => a.id == formData.id);
                if (existingIndex >= 0) articles[existingIndex] = formData;
                else articles.unshift(formData);
                
                render(); closeModal('editModal');

                try {
                    const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "save_info", data: formData, token: authToken }), redirect: "follow" });
                    const data = await res.json();
                    if(data.error) throw new Error(data.error);
                    if(formData.id.startsWith("temp_") && data.id) {
                        const idx = articles.findIndex(a => a.id === formData.id);
                        if(idx !== -1) articles[idx].id = data.id;
                    }
                    localStorage.setItem('mwr_info_data', JSON.stringify(articles));
                } catch(e) { 
                    alert("Failed to save! Please check your connection."); window.location.reload(); 
                } finally {
                    btn.innerHTML = `<i class="fa-solid fa-cloud-arrow-up"></i> Save Post`; btn.disabled = false;
                }
            };

            const deleteArticle = async () => {
                if (!isAdmin) return;
                const id = document.getElementById('articleId').value;
                if (!id || !confirm("Are you sure you want to permanently delete this guide?")) return;

                articles = articles.filter(a => a.id != id);
                render(); closeModal('editModal');

                try {
                    await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "delete_info", id: id, token: authToken }), redirect: "follow" });
                    localStorage.setItem('mwr_info_data', JSON.stringify(articles));
                } catch(e) { alert("Failed to delete."); window.location.reload(); }
            };

            const openImageGallery = async () => {
                if (!document.getElementById('imageGalleryModal')) {
                    const modalHtml = `
                    <div id="imageGalleryModal" class="fixed inset-0 z-[60] hidden flex items-center justify-center p-4 bg-black/90 backdrop-blur-sm">
                        <div class="bg-gray-800 border border-gray-700 rounded-xl p-4 sm:p-6 shadow-2xl w-full max-w-4xl h-[80vh] flex flex-col">
                            <div class="flex justify-between items-center mb-4 border-b border-gray-700 pb-2 shrink-0">
                                <h3 class="text-xl font-bold text-white"><i class="fa-solid fa-images text-blue-400 mr-2"></i> Select Image</h3>
                                <button type="button" onclick="document.getElementById('imageGalleryModal').classList.add('hidden')" class="text-gray-400 hover:text-white transition-colors"><i class="fa-solid fa-xmark text-xl"></i></button>
                            </div>
                            <div class="mb-4 shrink-0">
                                <input type="text" id="gallerySearchInput" onkeyup="app.filterGallery()" placeholder="Search images..." class="w-full bg-gray-900 border border-gray-600 rounded px-3 py-2 text-white outline-none focus:border-blue-500">
                            </div>
                            <div id="galleryGrid" class="flex-grow overflow-y-auto hide-scrollbar grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 gap-3 content-start">
                                <div class="col-span-full text-center text-gray-500 py-10"><i class="fas fa-circle-notch fa-spin text-2xl text-blue-500 mb-2"></i><br>Loading Library...</div>
                            </div>
                        </div>
                    </div>`;
                    document.body.insertAdjacentHTML('beforeend', modalHtml);
                }
                
                document.getElementById('imageGalleryModal').classList.remove('hidden');
                const grid = document.getElementById('galleryGrid');
                
                if (galleryCache.length === 0) {
                    try {
                        const res = await fetch(API_URL, { 
                            method: "POST", 
                            body: JSON.stringify({ action: "list_images", token: authToken }), 
                            redirect: "follow" 
                        });
                        const data = await res.json();
                        if (data.error) throw new Error(data.error);
                        galleryCache = data;
                        renderGallery();
                    } catch(e) {
                        grid.innerHTML = `<div class="col-span-full text-red-400 text-center py-10">Failed to load images.</div>`;
                    }
                } else {
                    renderGallery();
                }
            };

            const renderGallery = () => {
                const grid = document.getElementById('galleryGrid');
                const search = document.getElementById('gallerySearchInput').value.toLowerCase();
                
                const filtered = galleryCache.filter(img => img.name.toLowerCase().includes(search));
                
                if (filtered.length === 0) {
                    grid.innerHTML = `<div class="col-span-full text-gray-500 text-center py-10">No images found.</div>`;
                    return;
                }
                
                // FIX: Added absolute inset-0 wrapper to strictly lock the image to the grid cell bounds
                grid.innerHTML = filtered.map(img => `
                    <div onclick="app.selectImage('${img.download_url}')" class="bg-gray-900 rounded-lg overflow-hidden border border-gray-700 hover:border-blue-500 cursor-pointer aspect-square relative group transition-colors">
                        <div class="absolute inset-0 p-2 flex items-center justify-center">
                            <img src="${img.download_url}" class="max-w-full max-h-full object-contain drop-shadow-md group-hover:scale-110 transition-transform">
                        </div>
                        <div class="absolute bottom-0 left-0 right-0 bg-black/80 text-[10px] text-gray-300 truncate px-1 py-1 text-center z-10">${img.name}</div>
                    </div>
                `).join('');
            };

            const filterGallery = () => renderGallery();

            const selectImage = (url) => {
                document.getElementById('articleImage').value = url;
                document.getElementById('imageGalleryModal').classList.add('hidden');
            };

            const uploadImage = async (event) => {
                const file = event.target.files[0];
                if(!file) return;
                
                const title = document.getElementById('articleTitle').value;
                if(!title) { alert("Please enter a Title first so we can name the file!"); event.target.value = ""; return; }

                const imgInput = document.getElementById('articleImage');
                const oldVal = imgInput.value;
                imgInput.value = "Converting & Uploading...";

                try {
                    const base64WebP = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.readAsDataURL(file);
                        reader.onload = (e) => {
                            const img = new Image();
                            img.src = e.target.result;
                            img.onload = () => {
                                const canvas = document.createElement('canvas');
                                canvas.width = img.width; canvas.height = img.height;
                                canvas.getContext('2d').drawImage(img, 0, 0);
                                resolve(canvas.toDataURL('image/webp', 0.85).split(',')[1]);
                            };
                            img.onerror = () => reject("Image processing failed.");
                        };
                        reader.onerror = () => reject("File reading failed.");
                    });

                    const safeName = title.replace(/[^a-zA-Z0-9]/g, "").toLowerCase();
                    const fileName = `post_${safeName}_${Date.now()}.webp`;

                    const res = await fetch(API_URL, { 
                        method: "POST", 
                        body: JSON.stringify({ action: "upload_image", fileData: base64WebP, fileName: fileName, token: authToken }), 
                        redirect: "follow" 
                    });
                    const data = await res.json();
                    
                    if(data.error) throw new Error(data.error);
                    imgInput.value = data.url;
                    
                    // Reset cache so new image shows next time gallery is opened
                    galleryCache = [];
                } catch(e) {
                    alert("Upload failed: " + e.message);
                    imgInput.value = oldVal;
                } finally {
                    event.target.value = ""; 
                }
            };

            return { init, render, viewArticle, openEditModal, closeModal, saveArticle, deleteArticle, toggleSidebar, setView, openImageGallery, filterGallery, selectImage, uploadImage };
        })();
        window.onload = app.init;
    </script>
</body>
</html>
