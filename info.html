<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- PRIMARY SEO META TAGS -->
    <title>Mini Warriors Reborn Tierlist and Guides</title>
    <meta name="title" content="Mini Warriors Reborn Tierlist">
    <meta name="description" content="The ultimate Mini Warriors Reborn (MWR) Tierlist. Discover the best heroes for early game, late game, and sacrament priority. Built by the Legion Community.">
    <meta name="keywords" content="MWR, Mini Warriors Reborn, Mini Warriors, Mini Warriors Reborn tierlist, Mini Warriors tierlist, Legion Community Hub">
    <meta name="robots" content="index, follow">
    <meta name="language" content="English">

    <!-- OPEN GRAPH / FACEBOOK / DISCORD (For nice link previews) -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://nekowoah.github.io/mwtierlist/">
    <meta property="og:title" content="Mini Warriors Reborn Tierlist">
    <meta property="og:description" content="The ultimate Mini Warriors Reborn (MWR) Tierlist. Discover the best heroes for early game, late game, and sacrament priority. Built by the Legion Community.">
    <meta property="og:image" content="https://i.imgur.com/Iy9jPqN.png">

    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Quill.js Rich Text Editor -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <link rel="icon" href="https://i.imgur.com/1h28KPo.png" type="image/x-icon">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans flex flex-col">

    <!-- Navigation -->
    <nav class="bg-gray-800 border-b border-gray-700 sticky top-0 z-40 shadow-xl">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center gap-4">
            <div class="flex items-center gap-4 sm:gap-6 flex-shrink-0">
                <div class="flex items-center gap-2 sm:gap-3">
                    <button onclick="app.toggleSidebar()" class="text-gray-400 hover:text-white transition-colors mr-1 outline-none">
                        <i class="fa-solid fa-bars text-lg sm:text-xl"></i>
                    </button>
                    <img id="adminIconBadge" src="https://i.imgur.com/1h28KPo.png" class="w-5 h-5 sm:w-6 sm:h-6 object-contain drop-shadow-[0_0_8px_rgba(59,130,246,0.3)] transition-all">
                    <span class="font-bold text-lg sm:text-xl tracking-wide hidden sm:inline" id="siteTitleText">MWR Information</span>
                </div>
            </div>
            <div class="flex gap-3 sm:gap-4 items-center justify-end" id="navControls">
                <!-- Admin Edit Button injected here -->
                <a href="https://dsc.gg/legion-mw" id="discordLink" target="_blank" class="bg-[#5865F2] hover:bg-[#4752C4] text-white p-1.5 rounded-full transition-colors w-8 h-8 sm:w-9 sm:h-9 flex items-center justify-center shadow-lg">
                    <i class="fa-brands fa-discord text-sm sm:text-base"></i>
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-5xl mx-auto px-4 py-8 sm:py-12 w-full flex-grow relative z-0">
        
        <div id="loading" class="text-center py-16">
            <i class="fas fa-circle-notch fa-spin text-4xl text-blue-500 mb-3"></i>
            <p class="text-gray-400 text-sm animate-pulse">Loading Information...</p>
        </div>

        <!-- PUBLIC VIEW -->
        <article id="contentViewer" class="hidden prose prose-invert prose-blue prose-img:rounded-xl prose-a:text-blue-400 max-w-none w-full bg-gray-800/40 p-6 sm:p-10 rounded-2xl border border-gray-700/50 shadow-2xl">
            <!-- Data injected here -->
        </article>

        <!-- ADMIN EDITOR VIEW -->
        <div id="editorWrapper" class="hidden bg-gray-100 text-gray-900 rounded-2xl overflow-hidden shadow-2xl flex flex-col border border-gray-300 mt-4">
            <div class="bg-gray-200 p-4 border-b border-gray-300 flex justify-between items-center">
                <h3 class="font-bold text-gray-800 text-sm uppercase tracking-wider"><i class="fa-solid fa-pen-nib mr-2"></i> Page Editor</h3>
                <div class="flex gap-2">
                    <button onclick="app.cancelEditor()" class="px-4 py-1.5 bg-gray-400 hover:bg-gray-500 text-white text-xs font-bold rounded transition-colors">Cancel</button>
                    <button onclick="app.saveInfo()" id="btnSaveInfo" class="px-4 py-1.5 bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold rounded shadow-md transition-colors">Save & Publish</button>
                </div>
            </div>
            <div id="quillEditor" class="bg-white" style="min-height: 500px; font-size: 16px;"></div>
        </div>
    </main>
    
    <footer class="bg-gray-800 border-t border-gray-700 py-6 text-center text-gray-500 text-sm mt-auto">
        <p>MWR Tierlist! Built by the Legion Community</p>
    </footer>

    <!-- 1. IMPORT THE SMART MENU -->
    <script src="menu.js"></script>

    <script>
        const app = (() => {
            const API_URL = "https://script.google.com/macros/s/AKfycbyNcCFpZaPBG4vOFPCJjO7Wg3z6m0FcHwKR1tRRbvK9D5cPKY2OBpKYtnx-86mQnKSz/exec"; 
            
            let isAdmin = false;
            let authToken = "";
            let rawHtmlContent = "";
            let quillInstance = null;

            const toggleSidebar = () => {
                const sidebar = document.getElementById('sidebar');
                const overlay = document.getElementById('sidebarOverlay');
                if (sidebar.classList.contains('-translate-x-full')) {
                    sidebar.classList.remove('-translate-x-full');
                    overlay.classList.remove('hidden');
                } else {
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
            };

            const exitAdmin = () => {
                window.location.hash = '';
                window.location.reload();
            };

            const init = async () => {
                if (window.location.hash === '#admin') {
                    const savedToken = sessionStorage.getItem('mw_admin_token');
                    if (savedToken) {
                        isAdmin = true;
                        authToken = savedToken;
                        
                        document.getElementById('siteTitleText').innerText = "Editor Mode";
                        document.getElementById('adminIconBadge').className = "w-5 h-5 sm:w-6 sm:h-6 object-contain drop-shadow-[0_0_8px_rgba(74,222,128,0.8)] transition-all";
                        document.getElementById('discordLink').classList.add('hidden');
                        
                        document.getElementById('navControls').insertAdjacentHTML('afterbegin', `
                            <button onclick="app.enableEditor()" id="btnEditPage" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-1.5 sm:py-2 rounded-lg transition-colors text-xs sm:text-sm font-bold shadow-lg flex-shrink-0">
                                <i class="fa-solid fa-pen-to-square mr-1.5"></i> Edit Article
                            </button>
                        `);
                    } else {
                        window.location.href = 'admin.html';
                        return;
                    }
                }

                AppMenu.build(isAdmin, 'blue');
                loadData();
            };

            const loadData = async () => {
                const loadingEl = document.getElementById('loading');
                const viewerEl = document.getElementById('contentViewer');
                
                const cachedInfo = localStorage.getItem('mwr_info_data');
                if (cachedInfo) {
                    rawHtmlContent = cachedInfo;
                    viewerEl.innerHTML = rawHtmlContent;
                    loadingEl.classList.add('hidden');
                    viewerEl.classList.remove('hidden');
                } else {
                    loadingEl.classList.remove('hidden');
                    viewerEl.classList.add('hidden');
                }

                try {
                    const res = await fetch(API_URL + "?view=info");
                    const data = await res.json();
                    
                    if (data.content && data.content !== rawHtmlContent) {
                        rawHtmlContent = data.content;
                        viewerEl.innerHTML = rawHtmlContent;
                        localStorage.setItem('mwr_info_data', rawHtmlContent);
                        
                        loadingEl.classList.add('hidden');
                        viewerEl.classList.remove('hidden');
                    }
                } catch(e) {
                    if(!cachedInfo) loadingEl.innerHTML = `<p class="text-red-400">Failed to load information page.</p>`;
                }
            };

            const enableEditor = () => {
                document.getElementById('contentViewer').classList.add('hidden');
                document.getElementById('editorWrapper').classList.remove('hidden');
                document.getElementById('btnEditPage').classList.add('hidden');

                if (!quillInstance) {
                    quillInstance = new Quill('#quillEditor', {
                        theme: 'snow',
                        modules: {
                            toolbar: [
                                [{ 'header': [1, 2, 3, false] }],
                                ['bold', 'italic', 'underline', 'strike'],
                                [{ 'color': [] }, { 'background': [] }],
                                [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                                ['link', 'image', 'video'],
                                ['clean']
                            ]
                        }
                    });
                }
                quillInstance.root.innerHTML = rawHtmlContent;
            };

            const cancelEditor = () => {
                document.getElementById('editorWrapper').classList.add('hidden');
                if (rawHtmlContent) document.getElementById('contentViewer').classList.remove('hidden');
                document.getElementById('btnEditPage').classList.remove('hidden');
            };

            const saveInfo = async () => {
                if (!quillInstance) return;
                const btn = document.getElementById('btnSaveInfo');
                btn.innerText = "Saving..."; btn.disabled = true;

                const newHtml = quillInstance.root.innerHTML;

                try {
                    const res = await fetch(API_URL, { 
                        method: "POST", 
                        body: JSON.stringify({ action: "save_info", token: authToken, content: newHtml }),
                        redirect: "follow" 
                    });
                    const data = await res.json();
                    if(data.error) throw new Error(data.error);

                    rawHtmlContent = newHtml;
                    localStorage.setItem('mwr_info_data', rawHtmlContent);
                    document.getElementById('contentViewer').innerHTML = rawHtmlContent;
                    cancelEditor();
                } catch(e) {
                    alert("Failed to save: " + e.message);
                } finally {
                    btn.innerText = "Save & Publish"; btn.disabled = false;
                }
            };

            return { init, toggleSidebar, enableEditor, cancelEditor, saveInfo, exitAdmin };
        })();
        
        window.onload = app.init;
    </script>
</body>
</html>
