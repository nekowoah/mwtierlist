<!DOCTYPE html>

<head>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="shared/globals.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="shared/styles.css">
    <link rel="icon" href="https://i.imgur.com/QuIPTg5.png" type="image/x-icon">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="shared/styles.css">

    <link rel="icon" href="https://i.imgur.com/1h28KPo.png" type="image/x-icon">

    <style>
        /* QUILL EDITOR THEME OVERRIDES: Forces the rich text editor to follow our Light/Dark Mode CSS variables */
        .ql-toolbar.ql-snow, .ql-container.ql-snow {
            border-color: rgba(var(--color-gray-700), 1) !important;
            font-family: inherit !important;
        }
        .ql-snow .ql-stroke {
            stroke: rgba(var(--color-gray-300), 1) !important;
        }
        .ql-snow .ql-fill, .ql-snow .ql-stroke.ql-fill {
            fill: rgba(var(--color-gray-300), 1) !important;
        }
        .ql-snow .ql-picker {
            color: rgba(var(--color-gray-300), 1) !important;
        }
        .ql-snow .ql-picker-options {
            background-color: rgba(var(--color-gray-800), 1) !important;
            border-color: rgba(var(--color-gray-700), 1) !important;
        }
        .ql-snow .ql-tooltip {
            background-color: rgba(var(--color-gray-900), 1) !important;
            border-color: rgba(var(--color-gray-700), 1) !important;
            color: rgba(var(--color-gray-100), 1) !important;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5) !important;
        }
        .ql-snow .ql-tooltip input[type=text] {
            background-color: rgba(var(--color-gray-800), 1) !important;
            border-color: rgba(var(--color-gray-600), 1) !important;
            color: rgba(var(--color-gray-100), 1) !important;
        }
        .ql-editor.ql-blank::before {
            color: rgba(var(--color-gray-500), 1) !important;
        }
        /* FIX: Ensure the text isn't blending into the background by forcing !important */
        .ql-editor {
            color: rgba(var(--color-gray-200), 1) !important;
            min-height: 500px;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans flex flex-col transition-colors duration-300">

    <nav class="bg-gray-800 border-b border-gray-700 sticky top-0 z-40 shadow-xl transition-colors duration-300">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center gap-4">
            <div class="flex items-center gap-4 sm:gap-6 flex-shrink-0">
                <div class="flex items-center gap-2 sm:gap-3">
                    <button onclick="AppMenu.toggleSidebar()" class="text-gray-400 hover:text-white transition-colors mr-1 outline-none">
                        <i class="fa-solid fa-bars text-lg sm:text-xl"></i>
                    </button>
                    <img id="adminIconBadge" src="https://i.imgur.com/1h28KPo.png" class="w-5 h-5 sm:w-6 sm:h-6 object-contain drop-shadow-[0_0_8px_rgba(59,130,246,0.3)] transition-all">
                    <span class="font-bold text-lg sm:text-xl tracking-wide hidden sm:inline" id="siteTitleText">MWR Information</span>
                </div>
            </div>
            <div class="flex gap-3 sm:gap-4 items-center justify-end" id="navControls">
                <a href="https://dsc.gg/legion-mw" id="discordLink" target="_blank" class="bg-[#5865F2] hover:bg-[#4752C4] text-white p-1.5 rounded-full transition-colors w-8 h-8 sm:w-9 sm:h-9 flex items-center justify-center shadow-lg">
                    <i class="fa-brands fa-discord text-sm sm:text-base"></i>
                </a>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-8 sm:py-12 w-full flex-grow relative z-0">
        <div id="loading" class="text-center py-16">
            <i class="fas fa-circle-notch fa-spin text-4xl text-blue-500 mb-3"></i>
            <p class="text-gray-400 text-sm animate-pulse">Loading Information...</p>
        </div>

        <article id="contentViewer" class="hidden prose prose-invert prose-blue prose-img:rounded-xl prose-a:text-blue-400 max-w-none w-full bg-gray-800/40 p-6 sm:p-10 rounded-2xl border border-gray-700/50 shadow-2xl transition-colors duration-300"></article>

        <!-- UPDATED: Editor Wrapper now uses dynamic theme gray classes instead of hardcoded white/light gray -->
        <div id="editorWrapper" class="hidden bg-gray-800 text-gray-200 rounded-2xl overflow-hidden shadow-2xl flex flex-col border border-gray-700 mt-4 transition-colors duration-300">
            <div class="bg-gray-900 p-4 border-b border-gray-700 flex justify-between items-center transition-colors duration-300">
                <h3 class="font-bold text-gray-300 text-sm uppercase tracking-wider"><i class="fa-solid fa-pen-nib mr-2 text-blue-400"></i> Page Editor</h3>
                <div class="flex gap-2">
                    <button onclick="app.cancelEditor()" class="px-4 py-1.5 bg-gray-600 hover:bg-gray-500 text-white text-xs font-bold rounded transition-colors">Cancel</button>
                    <button onclick="app.saveInfo()" id="btnSaveInfo" class="px-4 py-1.5 bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold rounded shadow-md transition-colors">Save & Publish</button>
                </div>
            </div>
            <!-- UPDATED: Removed bg-white so it inherits the container's background -->
            <div id="quillEditor" class="bg-gray-800 transition-colors duration-300" style="font-size: 16px;"></div>
        </div>
    </main>
    
    <footer class="bg-gray-800 border-t border-gray-700 py-6 text-center text-gray-500 text-sm mt-auto transition-colors duration-300">
        <p>MWR Tierlist! Built by the Legion Community</p>
    </footer>

    <script>
        const app = (() => {
            const GLOBALS = window.MWR_GLOBALS || {};
            const API_URL = GLOBALS.API_URL || "";
            
            let isAdmin = false;
            let authToken = "";
            let rawHtmlContent = "";
            let quillInstance = null;

            const init = async () => {
                if (!window.MWR_GLOBALS) {
                    document.getElementById('loading').innerHTML = `<div class="bg-red-900/20 border border-red-500/50 rounded-xl p-6 max-w-md mx-auto mt-10"><i class="fa-solid fa-triangle-exclamation text-4xl text-red-500 mb-3"></i><h3 class="text-xl font-black text-white mb-2">Missing Shared Files</h3><p class="text-gray-300 text-sm">Cannot find shared/globals.js</p></div>`;
                    return; 
                }

                if (window.location.hash === '#admin') {
                    const savedToken = sessionStorage.getItem('mw_admin_token');
                    if (savedToken) {
                        isAdmin = true;
                        authToken = savedToken;
                        document.getElementById('siteTitleText').innerText = "Editor Mode";
                        document.getElementById('adminIconBadge').className = "w-5 h-5 sm:w-6 sm:h-6 object-contain drop-shadow-[0_0_8px_rgba(74,222,128,0.8)] transition-all";
                        document.getElementById('discordLink').classList.add('hidden');
                        document.getElementById('navControls').insertAdjacentHTML('afterbegin', `<button onclick="app.enableEditor()" id="btnEditPage" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-1.5 sm:py-2 rounded-lg transition-colors text-xs sm:text-sm font-bold shadow-lg flex-shrink-0"><i class="fa-solid fa-pen-to-square mr-1.5"></i> Edit Article</button>`);
                    } else { window.location.href = 'admin.html'; return; }
                }

                window.AppMenu.build(isAdmin, 'blue');
                loadData();
            };

            const loadData = async () => {
                const loadingEl = document.getElementById('loading');
                const viewerEl = document.getElementById('contentViewer');
                
                const cachedInfo = localStorage.getItem('mwr_info_data');
                if (cachedInfo) {
                    rawHtmlContent = cachedInfo;
                    viewerEl.innerHTML = rawHtmlContent;
                    loadingEl.classList.add('hidden');
                    viewerEl.classList.remove('hidden');
                    console.log("Loaded content from cache. Length:", rawHtmlContent.length);
                }

                try {
                    const res = await fetch(API_URL + "?view=info");
                    const data = await res.json();
                    
                    if (data.error) {
                        console.error("API returned an error:", data.error);
                        throw new Error(data.error);
                    }

                    if (data.content && data.content !== rawHtmlContent) {
                        console.log("New content fetched from server. Length:", data.content.length);
                        rawHtmlContent = data.content;
                        viewerEl.innerHTML = rawHtmlContent;
                        localStorage.setItem('mwr_info_data', rawHtmlContent);
                        
                        // If the editor is already open when background data arrives, sync it via dangerouslyPasteHTML
                        if (quillInstance && !document.getElementById('editorWrapper').classList.contains('hidden')) {
                            quillInstance.clipboard.dangerouslyPasteHTML(rawHtmlContent);
                        }
                        
                        loadingEl.classList.add('hidden');
                        
                        // Only show viewer if editor isn't active
                        if (document.getElementById('editorWrapper').classList.contains('hidden')) {
                            viewerEl.classList.remove('hidden');
                        }
                    }
                } catch(e) {
                    console.error("Failed to fetch Info Data:", e);
                    if(!cachedInfo) loadingEl.innerHTML = `<p class="text-red-400">Failed to load information page. Check console for details.</p>`;
                }
            };

            const enableEditor = () => {
                document.getElementById('contentViewer').classList.add('hidden');
                document.getElementById('editorWrapper').classList.remove('hidden');
                document.getElementById('btnEditPage').classList.add('hidden');

                try {
                    if (!quillInstance) {
                        console.log("Initializing Quill for the first time...");
                        
                        // FIX 1: Pre-inject the HTML into the div BEFORE initializing Quill. 
                        // This forces Quill's parser to adopt the exact HTML structure correctly on boot.
                        document.getElementById('quillEditor').innerHTML = rawHtmlContent || '';

                        quillInstance = new Quill('#quillEditor', {
                            theme: 'snow',
                            modules: {
                                toolbar: {
                                    container: [
                                        [{ 'header': [1, 2, 3, false] }],
                                        ['bold', 'italic', 'underline', 'strike'],
                                        [{ 'color': [] }, { 'background': [] }],
                                        [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                                        ['link', 'image', 'video'],
                                        ['clean']
                                    ],
                                    // CUSTOM IMAGE HANDLER: Uploads to GitHub instead of saving raw base64 data
                                    handlers: {
                                        image: function() {
                                            const input = document.createElement('input');
                                            input.setAttribute('type', 'file');
                                            input.setAttribute('accept', 'image/*');
                                            input.click();

                                            input.onchange = async () => {
                                                const file = input.files[0];
                                                if (!file) return;

                                                const btn = document.getElementById('btnSaveInfo');
                                                const oldText = btn.innerText;
                                                btn.innerText = "Uploading Image to Server..."; 
                                                btn.disabled = true;

                                                const reader = new FileReader();
                                                reader.readAsDataURL(file);
                                                reader.onload = async () => {
                                                    const base64 = reader.result.split(',')[1];
                                                    try {
                                                        const res = await fetch(API_URL, {
                                                            method: "POST",
                                                            body: JSON.stringify({ 
                                                                action: "upload_image", 
                                                                token: authToken, 
                                                                fileData: base64, 
                                                                fileName: "info_img_" + Date.now() + "_" + file.name.replace(/[^a-zA-Z0-9.]/g, "") 
                                                            }),
                                                            redirect: "follow"
                                                        });
                                                        const data = await res.json();
                                                        if(data.error) throw new Error(data.error);

                                                        const range = quillInstance.getSelection(true);
                                                        quillInstance.insertEmbed(range.index, 'image', data.url);
                                                    } catch(e) {
                                                        alert("Image upload failed: " + e.message);
                                                        console.error("Image Upload Error:", e);
                                                    } finally {
                                                        btn.innerText = oldText; 
                                                        btn.disabled = false;
                                                    }
                                                };
                                            };
                                        }
                                    }
                                }
                            }
                        });
                    } else {
                        console.log("Quill already initialized, re-pasting data...");
                        // FIX 2: If we are just toggling the editor back on, use the official paste command
                        quillInstance.clipboard.dangerouslyPasteHTML(rawHtmlContent || '');
                    }
                } catch (err) {
                    console.error("Editor Boot Error:", err);
                    alert("Failed to start the editor. Press F12 to check the console for details.");
                }
            };

            const cancelEditor = () => {
                document.getElementById('editorWrapper').classList.add('hidden');
                if (rawHtmlContent) document.getElementById('contentViewer').classList.remove('hidden');
                document.getElementById('btnEditPage').classList.remove('hidden');
            };

            const saveInfo = async () => {
                if (!quillInstance) return;
                const btn = document.getElementById('btnSaveInfo');
                btn.innerText = "Saving..."; btn.disabled = true;
                
                const newHtml = quillInstance.root.innerHTML;

                // GUARDRAIL: Prevent saving if user dragged/copy-pasted raw image data
                if (newHtml.includes('data:image/')) {
                    alert("WARNING: Direct image copy-pasting detected.\n\nGoogle Sheets limits data size and will crash if you try to save raw images directly.\n\nPlease delete the copy-pasted image, and use the 'Image Icon' in the editor toolbar to upload it properly!");
                    btn.innerText = "Save & Publish"; btn.disabled = false;
                    return;
                }

                if (newHtml.length > 49000) {
                    alert(`Error: The text is too long for Google Sheets to save (${newHtml.length} characters). Please reduce the length.`);
                    btn.innerText = "Save & Publish"; btn.disabled = false;
                    return;
                }

                try {
                    const res = await fetch(API_URL, { 
                        method: "POST", 
                        body: JSON.stringify({ action: "save_info", token: authToken, content: newHtml }),
                        redirect: "follow" 
                    });
                    const data = await res.json();
                    
                    if(data.error) throw new Error(data.error);

                    rawHtmlContent = newHtml;
                    localStorage.setItem('mwr_info_data', rawHtmlContent);
                    document.getElementById('contentViewer').innerHTML = rawHtmlContent;
                    cancelEditor();
                    console.log("Save successful!");

                } catch(e) { 
                    alert("Failed to save: " + e.message); 
                    console.error("Save Error:", e);
                } finally { 
                    btn.innerText = "Save & Publish"; btn.disabled = false; 
                }
            };

            return { init, enableEditor, cancelEditor, saveInfo };
        })();
        
        window.onload = app.init;
    </script>
</body>
</html>
