<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>MWR Information</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.tailwindcss.com https://cdn.quilljs.com https://cdn.jsdelivr.net https://unpkg.com https://www.gstatic.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://cdn.quilljs.com https://cdn.jsdelivr.net https://unpkg.com; img-src 'self' data: blob: https://i.imgur.com https://raw.githubusercontent.com https://placehold.co https://mwreborn.irunawiki.com https://www.google-analytics.com; connect-src 'self' https://script.google.com https://script.googleusercontent.com https://api.github.com https://firestore.googleapis.com https://*.firebaseio.com https://www.gstatic.com https://www.google-analytics.com https://analytics.google.com; font-src 'self' data: https://cdnjs.cloudflare.com;">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script src="https://unpkg.com/quill-blot-formatter@1.0.5/dist/BlotFormatter.min.js"></script>
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <script src="shared/globals.js"></script>
    <script src="shared/image-picker.js"></script>
    <script src="shared/info-editor.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="shared/styles.css">
    <link rel="icon" href="https://i.imgur.com/1h28KPo.png" type="image/x-icon">

    <style>
        .ql-editor { color: #d1d5db; font-family: inherit; font-size: 0.95rem; line-height: 1.6; }
        .ql-editor h1 { color: #60a5fa; font-weight: 900; font-size: 1.75rem; margin-bottom: 0.5rem; }
        .ql-editor h2 { color: #93c5fd; font-weight: 800; font-size: 1.5rem; margin-bottom: 0.5rem; }
        .ql-editor h3 { color: #bfdbfe; font-weight: 700; font-size: 1.25rem; margin-bottom: 0.5rem; }
        .ql-editor a { color: #60a5fa; text-decoration: underline; }
        .ql-editor ul, .ql-editor ol { padding-left: 1.5rem; margin-bottom: 1rem; }
        .ql-editor li { padding-bottom: 0.25rem; }
        .ql-toolbar.ql-snow { background-color: #1f2937; border-color: #374151; border-top-left-radius: 0.5rem; border-top-right-radius: 0.5rem; }
        .ql-container.ql-snow { border-color: #374151; border-bottom-left-radius: 0.5rem; border-bottom-right-radius: 0.5rem; }
        .ql-snow .ql-stroke { stroke: #9ca3af; }
        .ql-snow .ql-fill, .ql-snow .ql-stroke.ql-fill { fill: #9ca3af; }
        .ql-snow .ql-picker { color: #9ca3af; }

        /* Quill Image Resize & Alignment */
        .ql-editor img { max-width: 100%; height: auto; cursor: pointer; border-radius: 0.375rem; margin: 0.5rem 0; }
        .ql-editor .ql-align-center { text-align: center; }
        .ql-editor .ql-align-right { text-align: right; }
        .ql-editor .ql-align-left { text-align: left; }
        .ql-editor .ql-align-center img { margin: 0.5rem auto; display: block; }

        /* Full Page Article View */
        #articleFullPage .article-banner { max-height: 280px; object-fit: cover; width: 100%; border-radius: 0.75rem; }
        #articleFullPage .article-body img { max-width: 100%; height: auto; border-radius: 0.375rem; margin: 0.75rem 0; }

        /* Recommended Heroes Row */
        .hero-rec-row { display: flex; flex-wrap: wrap; gap: 0.75rem; justify-content: center; padding: 1rem 0; }
        .hero-rec-circle { width: 56px; height: 56px; border-radius: 50%; border: 2px solid #6b7280; overflow: hidden; position: relative; flex-shrink: 0; transition: transform 0.15s, box-shadow 0.15s; }
        .hero-rec-circle:hover { transform: scale(1.1); }
        .hero-rec-circle img { width: 100%; height: 100%; object-fit: cover; margin: 0 !important; border-radius: 0 !important; }
        .hero-rec-circle.type-vip { border-color: #fbbf24; }
        .hero-rec-circle.type-limited { border-color: #c90dde; }
        .hero-rec-circle.type-basic { border-color: #22c55e; }
        .hero-rec-label { text-align: center; font-size: 9px; font-weight: 700; color: #9ca3af; margin-top: 2px; max-width: 56px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* Hero Picker in Editor */
        .hero-pick-item { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #6b7280; overflow: hidden; cursor: pointer; transition: transform 0.1s, opacity 0.2s; flex-shrink: 0; }
        .hero-pick-item:hover { transform: scale(1.1); }
        .hero-pick-item.selected-hero { box-shadow: 0 0 0 2px #60a5fa; opacity: 0.4; }
        .hero-pick-item.type-vip { border-color: #fbbf24; }
        .hero-pick-item.type-limited { border-color: #c90dde; }
        .hero-pick-item.type-basic { border-color: #22c55e; }

        /* Formation Grid Display */
        .formation-grid { display: grid; grid-template-columns: repeat(5, 1fr); grid-template-rows: repeat(7, 1fr); gap: 3px; aspect-ratio: 5/7; max-width: 280px; margin: 0 auto; background: #111827; border: 1px solid #374151; border-radius: 0.5rem; padding: 4px; }
        .formation-cell { background: #1f2937; border: 1px solid #374151; border-radius: 0.25rem; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
        .formation-cell img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; margin: 0 !important; }
        .formation-cell .cell-hero-border { width: 90%; height: 90%; border-radius: 50%; border: 2px solid #6b7280; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .formation-cell .cell-hero-border.type-vip { border-color: #fbbf24; }
        .formation-cell .cell-hero-border.type-limited { border-color: #c90dde; }
        .formation-cell .cell-hero-border.type-basic { border-color: #22c55e; }

        /* Generic Embed Block (used for self-contained formations and hero lists) */
        .mwr-embed-block {
            margin: 0;
            position: relative;
        }
        .mwr-embed-block img {
            margin: 0 !important;
        }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans flex flex-col transition-colors duration-300">

    <nav class="bg-gray-800 border-b border-gray-700 sticky top-0 z-40 shadow-xl transition-colors duration-300">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <button onclick="app.toggleSidebar()" class="text-gray-400 hover:text-white transition-colors outline-none">
                    <i class="fa-solid fa-bars text-xl"></i>
                </button>
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-book-open text-blue-400 text-xl"></i>
                    <span class="font-bold text-xl tracking-wide hidden sm:block" id="siteTitleText">MWR Information</span>
                </div>
            </div>
            
            <div class="flex items-center gap-4" id="navControls">
                <a href="https://dsc.gg/legion-mw" id="discordLink" target="_blank" class="bg-[#5865F2] hover:bg-[#4752C4] text-white p-1.5 rounded-full transition-colors w-9 h-9 flex items-center justify-center shadow-lg" title="Join our Discord">
                    <i class="fa-brands fa-discord text-base"></i>
                </a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8 w-full flex-grow flex flex-col">
        
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6">
            <div>
                <h1 class="text-3xl sm:text-4xl font-black text-white mb-1 tracking-tight">Guides & Knowledge</h1>
                <p class="text-gray-400 text-sm">Strategies, patch notes, and comprehensive game mechanics.</p>
            </div>
            
            <!-- Layout Toggles and Search -->
            <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
                <div class="flex bg-gray-800 rounded-lg p-1 shrink-0 h-[42px] border border-gray-700">
                    <button onclick="app.setView('grid')" id="view-grid" class="px-4 rounded-md text-white bg-gray-600 shadow-md transition-colors" title="Grid View"><i class="fa-solid fa-border-all"></i></button>
                    <button onclick="app.setView('list')" id="view-list" class="px-4 rounded-md text-gray-400 hover:text-white transition-colors" title="List View"><i class="fa-solid fa-list"></i></button>
                </div>
                <div class="relative w-full sm:w-64 group h-[42px]">
                    <input type="text" id="searchInput" onkeyup="app.render()" placeholder="Search titles or content..." 
                        class="w-full h-full bg-gray-800 border border-gray-600 rounded-lg px-4 pl-10 text-white focus:border-blue-500 outline-none transition-colors shadow-inner">
                    <i class="fa-solid fa-search absolute left-3.5 top-3.5 text-gray-400 group-focus-within:text-blue-500 transition-colors"></i>
                </div>
            </div>
        </div>

        <div id="loading" class="text-center py-16 flex-grow">
            <i class="fas fa-circle-notch fa-spin text-4xl text-blue-500 mb-3"></i>
            <p class="text-gray-500 text-sm animate-pulse">Loading Library...</p>
        </div>

        <!-- Dynamic Containers -->
        <div id="articleGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 sm:gap-4 flex-grow opacity-0 transition-opacity duration-500"></div>
        <div id="articleList" class="hidden flex flex-col gap-2 flex-grow opacity-0 transition-opacity duration-500"></div>

    </main>

    <!-- Full Page Article View (replaces the old modal) -->
    <div id="articleFullPage" class="hidden max-w-4xl mx-auto px-4 py-8 w-full flex-grow">
        <button onclick="app.closeArticle()" class="mb-6 text-gray-400 hover:text-white transition-colors flex items-center gap-2 group">
            <i class="fa-solid fa-arrow-left group-hover:-translate-x-1 transition-transform"></i>
            <span class="font-bold text-sm">Back to Guides</span>
        </button>
        <div id="fpBanner" class="hidden mb-6 rounded-xl overflow-hidden border border-gray-700 shadow-lg">
            <img id="fpBannerImg" src="" class="article-banner">
        </div>
        <h1 id="fpTitle" class="text-3xl sm:text-4xl font-black text-white mb-2 tracking-tight leading-tight"></h1>
        <div id="fpDate" class="text-xs text-blue-400 font-bold mb-6 tracking-wide"></div>
        <div id="fpContent" class="ql-editor p-0 bg-transparent border-0"></div>
    </div>

    <!-- Full-Page Editor Workspace (admin only, replaces old modal) -->
    <div id="articleEditPage" class="hidden max-w-5xl mx-auto px-4 py-6 w-full flex-grow">
        <div class="flex justify-between items-center mb-6">
            <button onclick="InfoEditor.closeEditor()" class="text-gray-400 hover:text-white transition-colors flex items-center gap-2 group">
                <i class="fa-solid fa-arrow-left group-hover:-translate-x-1 transition-transform"></i>
                <span class="font-bold text-sm">Back to Guides</span>
            </button>
            <h2 class="text-xl font-bold text-blue-400 flex items-center gap-2"><i class="fa-solid fa-pen-nib"></i> <span id="editorTitle">Edit Guide</span></h2>
        </div>

        <input type="hidden" id="editorArticleId">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
            <div>
                <label class="text-xs text-gray-400 uppercase font-bold block mb-1">Title</label>
                <input type="text" id="editorArticleTitle" required class="bg-gray-900 border border-gray-600 rounded px-4 py-2 w-full focus:border-blue-500 outline-none text-white font-bold transition-colors">
            </div>
            <div>
                <label class="text-xs text-gray-400 uppercase font-bold block mb-1">Banner Image URL (Optional)</label>
                <div class="flex gap-2">
                    <input type="url" id="editorBannerUrl" placeholder="https://..." class="bg-gray-900 border border-gray-600 rounded px-4 py-2 w-full focus:border-blue-500 outline-none text-white transition-colors">
                    <button type="button" onclick="ImagePicker.open((url) => document.getElementById('editorBannerUrl').value = url, 'Banner')" class="bg-gray-700 hover:bg-gray-600 text-white px-4 rounded border border-gray-600 transition-colors shadow-sm" title="Select Image from Gallery"><i class="fa-solid fa-images"></i></button>
                </div>
            </div>
        </div>

        <div class="flex flex-wrap items-center gap-x-6 gap-y-2 mb-4">
            <div class="flex items-center gap-2">
                <input type="checkbox" id="editorPinned" class="w-4 h-4 accent-blue-500 bg-gray-900 border-gray-600 rounded cursor-pointer">
                <label for="editorPinned" class="text-sm font-bold text-gray-300 cursor-pointer hover:text-white transition-colors"><i class="fa-solid fa-thumbtack text-red-500 mr-1.5"></i> Pin to Top</label>
            </div>
            <div class="flex items-center gap-2">
                <span id="editorCharCounter" class="text-xs font-bold text-gray-500">0 / 50,000 chars</span>
            </div>
        </div>

        <!-- Quill Editor -->
        <div class="mb-4">
            <label class="text-xs text-gray-400 uppercase font-bold block mb-1 flex justify-between">
                <span>Content Editor</span>
                <span class="text-yellow-500 font-normal italic text-[10px]"><i class="fa-solid fa-triangle-exclamation mr-1"></i>Use the <i class="fa-solid fa-images mx-1"></i> button to insert images from the library.</span>
            </label>
            <div id="editorQuillContainer" class="bg-gray-900 text-white rounded-b-lg overflow-hidden border-t-0" style="min-height: 400px;"></div>
        </div>

        <!-- Action Bar -->
        <div class="flex justify-between items-center pt-4 border-t border-gray-700">
            <button type="button" id="editorDeleteBtn" onclick="InfoEditor.deleteArticle()" class="text-red-400 hover:text-red-300 text-sm font-bold transition-colors hidden"><i class="fa-solid fa-trash mr-1"></i>Delete Guide</button>
            <div class="flex gap-3 ml-auto">
                <button type="button" onclick="InfoEditor.closeEditor()" class="px-5 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg text-white font-bold transition-colors shadow-lg">Cancel</button>
                <button type="button" id="editorSaveBtn" onclick="InfoEditor.saveArticle()" class="px-6 py-2 bg-blue-600 hover:bg-blue-500 rounded-lg text-white font-bold transition-colors shadow-lg flex items-center gap-2"><i class="fa-solid fa-cloud-arrow-up"></i> Save Post</button>
            </div>
        </div>
    </div>

    <footer class="bg-gray-800 border-t border-gray-700 py-6 text-center text-gray-500 text-sm mt-auto transition-colors duration-300">
        <p>MWR Information. Built by the Legion Community.</p>
    </footer>

    <script>
        const app = (() => {
            const { API_URL, db } = window.MWR_GLOBALS;
            
            let articles = [];
            let isAdmin = false;
            let authToken = "";
            let currentView = 'grid';
            const defaultTitle = 'MWR Information';

            const toggleSidebar = () => { if (window.AppMenu && window.AppMenu.toggleSidebar) window.AppMenu.toggleSidebar(); };

            const setView = (view) => {
                currentView = view;
                const gridBtn = document.getElementById('view-grid');
                const listBtn = document.getElementById('view-list');
                const gridContainer = document.getElementById('articleGrid');
                const listContainer = document.getElementById('articleList');

                if (view === 'grid') {
                    gridBtn.className = "px-4 rounded-md text-white bg-gray-600 shadow-md transition-colors";
                    listBtn.className = "px-4 rounded-md text-gray-400 hover:text-white transition-colors";
                    gridContainer.classList.remove('hidden'); listContainer.classList.add('hidden');
                    setTimeout(() => gridContainer.classList.remove('opacity-0'), 10);
                } else {
                    listBtn.className = "px-4 rounded-md text-white bg-gray-600 shadow-md transition-colors";
                    gridBtn.className = "px-4 rounded-md text-gray-400 hover:text-white transition-colors";
                    listContainer.classList.remove('hidden'); gridContainer.classList.add('hidden');
                    setTimeout(() => listContainer.classList.remove('opacity-0'), 10);
                }
                render();
            };


            const stripHtml = (html) => {
                let tmp = document.createElement("DIV"); tmp.innerHTML = html;
                return tmp.textContent || tmp.innerText || "";
            };

            const formatDate = (isoString) => {
                if (!isoString) return "";
                try {
                    const d = new Date(isoString);
                    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
                } catch(e) { return ""; }
            };


            // --- INIT ---
            const init = async () => {
                if (window.location.hash === '#admin') {
                    const savedToken = localStorage.getItem('mw_admin_token') || sessionStorage.getItem('mw_admin_token');
                    if (savedToken) {
                        isAdmin = true;
                        authToken = savedToken;
                        document.getElementById('siteTitleText').innerText = "Editor Mode";
                        document.getElementById('discordLink').classList.add('hidden');
                        document.getElementById('navControls').insertAdjacentHTML('afterbegin', `
                            <button onclick="app.openEditModal()" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-1.5 rounded-lg transition-colors font-bold shadow-lg flex items-center gap-2">
                                <i class="fa-solid fa-plus"></i><span class="hidden sm:inline">Add Guide</span>
                            </button>
                        `);

                        // Initialize the editor module
                        window.InfoEditor.init(authToken, {
                            onSave: (formData) => {
                                const idx = articles.findIndex(a => a.id == formData.id);
                                if (idx >= 0) articles[idx] = formData;
                                else articles.unshift(formData);
                                localStorage.setItem('mwr_info_data', JSON.stringify(articles));
                                showMainView();
                                render();
                            },
                            onDelete: (id) => {
                                articles = articles.filter(a => a.id != id);
                                localStorage.setItem('mwr_info_data', JSON.stringify(articles));
                                showMainView();
                                render();
                            },
                            onCancel: () => {
                                showMainView();
                            }
                        });
                    } else { window.location.href = 'admin.html'; return; }
                }

                if (window.AppMenu && window.AppMenu.build) window.AppMenu.build(isAdmin, 'blue');

                // Handle browser back/forward buttons
                window.addEventListener('popstate', () => {
                    const params = new URLSearchParams(window.location.search);
                    if (params.has('post')) {
                        showArticlePage(params.get('post'), false);
                    } else {
                        hideArticlePage(false);
                    }
                });

                // Load cached articles first
                const CACHE_KEY = 'mwr_info_data';
                const TIME_KEY = 'mwr_info_timestamp';
                const CHECK_KEY = 'mwr_info_lastcheck';
                const cachedData = localStorage.getItem(CACHE_KEY);
                const localTimestamp = localStorage.getItem(TIME_KEY);
                const lastCheck = localStorage.getItem(CHECK_KEY);
                const now = Date.now();
                
                if (cachedData) {
                    try {
                        const parsedCache = JSON.parse(cachedData);
                        if (Array.isArray(parsedCache)) {
                            articles = parsedCache;
                            document.getElementById('loading').classList.add('hidden');
                            document.getElementById(currentView === 'grid' ? 'articleGrid' : 'articleList').classList.remove('opacity-0');
                            render();
                        }
                    } catch(e) { console.warn("Cache parse error"); }
                }

                try {
                    let freshData = null;
                    const shouldCheck = !lastCheck || (now - parseInt(lastCheck)) > 120000;
                    
                    if (shouldCheck) {
                        try {
                            if (db) {
                                const metaRef = await db.collection('cache').doc('info_meta').get();
                                if (metaRef.exists) {
                                    const liveTimestamp = metaRef.data().lastUpdated;
                                    localStorage.setItem(CHECK_KEY, now.toString()); 

                                    if (!localTimestamp || liveTimestamp !== localTimestamp) {
                                        const docRef = await db.collection('cache').doc('info_payload').get();
                                        if (docRef.exists) {
                                            const payloadData = docRef.data();
                                            if (payloadData && payloadData.data) {
                                                const parsed = JSON.parse(payloadData.data);
                                                if (Array.isArray(parsed)) {
                                                    freshData = parsed;
                                                    localStorage.setItem(TIME_KEY, liveTimestamp);
                                                }
                                            }
                                        }
                                    }
                                }
                            }
                        } catch (fbErr) { console.warn("Firebase fetch failed. Falling back to GAS.", fbErr); }
                    }

                    if (!freshData && (!cachedData || articles.length === 0)) {
                        const res = await fetch(API_URL + "?view=info", { redirect: "follow" });
                        const gasData = await res.json();
                        if (Array.isArray(gasData)) freshData = gasData;
                        else if (gasData && Array.isArray(gasData.data)) freshData = gasData.data;
                        else throw new Error("Invalid format received from Google Apps Script.");
                    }
                    
                    if (freshData) {
                        articles = Array.isArray(freshData) ? freshData : [];
                        localStorage.setItem(CACHE_KEY, JSON.stringify(articles));
                        
                        document.getElementById('loading').classList.add('hidden');
                        document.getElementById(currentView === 'grid' ? 'articleGrid' : 'articleList').classList.remove('opacity-0');
                        render();
                    }
                    
                } catch(e) { 
                    if (!cachedData || articles.length === 0) {
                        document.getElementById('loading').innerHTML = `<p class="text-red-400 font-bold mb-2">Failed to load guides.</p><p class="text-xs text-gray-500">${e.message}</p>`; 
                    }
                }

                // Check if a ?post=ID param is in the URL after data is loaded
                const urlParams = new URLSearchParams(window.location.search);
                if (urlParams.has('post')) {
                    showArticlePage(urlParams.get('post'), false);
                }
            };

            // --- GRID/LIST RENDERING ---
            const render = () => {
                const grid = document.getElementById('articleGrid');
                const list = document.getElementById('articleList');
                const filterSearch = document.getElementById('searchInput').value.toLowerCase();
                
                grid.innerHTML = ''; list.innerHTML = '';

                const filtered = articles.filter(art => {
                    const searchMatchTitle = (art.title || "").toLowerCase().includes(filterSearch);
                    const rawContent = stripHtml(art.content || "").toLowerCase();
                    const searchMatchContent = rawContent.includes(filterSearch);
                    return searchMatchTitle || searchMatchContent;
                }).sort((a, b) => {
                    if (a.isPinned && !b.isPinned) return -1;
                    if (!a.isPinned && b.isPinned) return 1;
                    return new Date(b.lastUpdate || 0) > new Date(a.lastUpdate || 0) ? 1 : -1;
                });

                if (filtered.length === 0) {
                    const emptyMsg = `<div class="col-span-full text-center text-gray-500 py-10 w-full">No guides match your search.</div>`;
                    grid.innerHTML = emptyMsg; list.innerHTML = emptyMsg;
                    return;
                }

                grid.innerHTML = filtered.map(art => {
                    let adminControls = '';
                    if (isAdmin) {
                        adminControls = `<button onclick="event.stopPropagation(); app.openEditModal('${art.id}')" class="absolute top-2 right-2 bg-yellow-600/90 hover:bg-yellow-500 text-white w-7 h-7 rounded shadow-lg z-20 flex items-center justify-center backdrop-blur-sm transition-colors"><i class="fa-solid fa-pen text-[10px]"></i></button>`;
                    }
                    const pinHtml = art.isPinned ? `<div class="absolute -top-2.5 -left-2.5 bg-gray-900/90 text-red-500 w-8 h-8 rounded-full shadow-[0_4px_10px_rgba(0,0,0,0.5)] z-20 flex items-center justify-center backdrop-blur-sm border border-gray-700/50" title="Pinned Post"><i class="fa-solid fa-thumbtack text-xs"></i></div>` : '';
                    const bannerHtml = art.image 
                        ? `<div class="h-24 sm:h-28 bg-gray-900 relative overflow-hidden shrink-0 rounded-t-xl"><img src="${art.image}" class="w-full h-full object-cover opacity-70 group-hover:opacity-100 group-hover:scale-105 transition-all duration-500"></div>`
                        : `<div class="h-1 bg-blue-600 shrink-0 rounded-t-xl"></div>`;
                    const dateStr = formatDate(art.lastUpdate);

                    return `
                    <div onclick="app.viewArticle('${art.id}')" class="bg-gray-800 border border-gray-700 rounded-xl shadow-lg hover:border-blue-500 hover:shadow-[0_0_15px_rgba(59,130,246,0.3)] transition-all cursor-pointer group flex flex-col h-[160px] sm:h-[180px] relative">
                        ${adminControls}
                        ${pinHtml}
                        ${bannerHtml}
                        <div class="p-3 flex-grow flex flex-col relative items-center justify-start text-center">
                            <h3 class="text-sm font-bold text-white mb-1 line-clamp-3 leading-snug group-hover:text-blue-400 transition-colors w-full px-1">${art.title}</h3>
                            <div class="absolute bottom-2 right-3 text-[9px] sm:text-[10px] text-gray-500 font-bold bg-gray-900/80 px-2 py-0.5 rounded border border-gray-700/50">${dateStr}</div>
                        </div>
                    </div>
                    `;
                }).join('');

                list.innerHTML = filtered.map(art => {
                    let adminControls = '';
                    if (isAdmin) {
                        adminControls = `<button onclick="event.stopPropagation(); app.openEditModal('${art.id}')" class="bg-yellow-600/90 hover:bg-yellow-500 text-white w-7 h-7 rounded shadow-md z-20 flex items-center justify-center transition-colors shrink-0 ml-3"><i class="fa-solid fa-pen text-[10px]"></i></button>`;
                    }
                    const dateStr = formatDate(art.lastUpdate);
                    const pinIcon = art.isPinned ? `<i class="fa-solid fa-thumbtack text-red-500 mr-2" title="Pinned"></i>` : '';
                    return `
                    <div onclick="app.viewArticle('${art.id}')" class="bg-gray-800 border border-gray-700 rounded-lg p-3 sm:p-4 hover:bg-gray-750 hover:border-blue-500 transition-colors cursor-pointer group flex justify-between items-center relative shadow-sm">
                        <div class="flex items-center gap-3 overflow-hidden pr-4">
                            <i class="fa-regular fa-file-lines text-blue-400 text-lg sm:text-xl group-hover:text-blue-300 shrink-0"></i>
                            <h3 class="text-sm sm:text-base font-bold text-white group-hover:text-blue-400 transition-colors truncate">${pinIcon}${art.title}</h3>
                        </div>
                        <div class="flex items-center shrink-0">
                            <div class="text-[10px] sm:text-xs text-gray-400 font-bold whitespace-nowrap bg-gray-900/50 px-2 py-1 rounded border border-gray-700/50">${dateStr}</div>
                            ${adminControls}
                        </div>
                    </div>
                    `;
                }).join('');
            };


            // --- FULL PAGE ARTICLE VIEW ---
            const viewArticle = (id) => showArticlePage(id, true);

            const showArticlePage = (id, pushState) => {
                const art = articles.find(a => a.id === id);
                if (!art) return;

                document.querySelector('main').classList.add('hidden');
                document.getElementById('articleEditPage').classList.add('hidden');
                const fp = document.getElementById('articleFullPage');
                fp.classList.remove('hidden');

                // Banner
                const banner = document.getElementById('fpBanner');
                if (art.image) {
                    document.getElementById('fpBannerImg').src = art.image;
                    banner.classList.remove('hidden');
                } else {
                    banner.classList.add('hidden');
                }

                // Title & Date
                document.getElementById('fpTitle').innerText = art.title;
                const dateStr = formatDate(art.lastUpdate);
                const dateEl = document.getElementById('fpDate');
                if (dateStr) { dateEl.innerText = "Updated: " + dateStr; dateEl.classList.remove('hidden'); }
                else { dateEl.classList.add('hidden'); }

                // Content — self-contained HTML, no hydration needed
                document.getElementById('fpContent').innerHTML = art.content || "<p class='italic text-gray-500'>This guide is empty.</p>";

                // Update URL and title
                document.title = art.title + ' | MWR Information';
                if (pushState) {
                    history.pushState({ post: id }, '', '?post=' + id);
                }

                window.scrollTo(0, 0);
            };

            const closeArticle = () => hideArticlePage(true);

            const hideArticlePage = (pushState) => {
                document.getElementById('articleFullPage').classList.add('hidden');
                showMainView();
                document.title = defaultTitle;

                if (pushState) {
                    const base = window.location.pathname + window.location.hash;
                    history.pushState(null, '', base);
                }
            };

            const showMainView = () => {
                document.querySelector('main').classList.remove('hidden');
                document.getElementById('articleEditPage').classList.add('hidden');
                document.getElementById('articleFullPage').classList.add('hidden');
            };

            // --- EDIT (delegates to InfoEditor module) ---
            const openEditModal = (id = null) => {
                if (!isAdmin) return;
                document.querySelector('main').classList.add('hidden');
                document.getElementById('articleFullPage').classList.add('hidden');
                const art = id ? articles.find(a => a.id === id) : null;
                window.InfoEditor.openEditor(art);
            };

            return { init, render, viewArticle, openEditModal, closeArticle, toggleSidebar, setView };
        })();
        window.onload = app.init;
    </script>
</body>
</html>
