<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MWR! Information</title>
    
    <!-- Tailwind with Typography Plugin for beautiful rich text rendering -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Quill.js Rich Text Editor -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

    <link rel="icon" href="https://i.imgur.com/1h28KPo.png" type="image/x-icon">
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans flex flex-col">

    <!-- Sidebar Overlay -->
    <div id="sidebarOverlay" class="fixed inset-0 bg-black/50 backdrop-blur-sm z-50 hidden transition-opacity" onclick="app.toggleSidebar()"></div>
    
    <!-- Sidebar Menu -->
    <div id="sidebar" class="fixed top-0 left-0 h-full w-64 bg-gray-900 border-r border-gray-700 z-50 transform -translate-x-full transition-transform duration-300 ease-in-out shadow-2xl flex flex-col">
        <div class="p-4 border-b border-gray-700 flex justify-between items-center bg-gray-800">
            <div class="flex items-center gap-3">
                <img src="https://i.imgur.com/1h28KPo.png" class="w-6 h-6 object-contain drop-shadow-[0_0_8px_rgba(234,179,8,0.3)]">
                <span class="font-bold text-lg text-white">Menu</span>
            </div>
            <button onclick="app.toggleSidebar()" class="text-gray-400 hover:text-white p-1"><i class="fa-solid fa-times text-xl"></i></button>
        </div>
        <div class="flex-grow py-4 flex flex-col gap-2 px-3">
            <a href="index.html" class="flex items-center gap-3 px-4 py-3 text-gray-300 hover:bg-gray-800 hover:text-white rounded-lg font-bold transition-colors">
                <i class="fa-solid fa-list-ul w-5 text-center"></i> Tierlist
            </a>
            <a href="info.html" class="flex items-center gap-3 px-4 py-3 bg-indigo-600/20 text-indigo-400 border border-indigo-500/30 rounded-lg font-bold transition-colors">
                <i class="fa-solid fa-book-open w-5 text-center"></i> Information
            </a>
        </div>
        <div class="p-4 border-t border-gray-700 text-xs text-gray-500 text-center">
            MWR Community Hub
        </div>
    </div>

    <!-- Login Screen (Hidden unless #admin in URL) -->
    <div id="loginScreen" class="fixed inset-0 z-50 bg-gray-900 flex items-center justify-center hidden">
        <div class="bg-gray-800 p-8 rounded-lg shadow-xl border border-gray-700 w-full max-w-md text-center">
            <h2 class="text-2xl font-bold mb-6 text-indigo-400">Admin Access</h2>
            <input type="password" id="passwordInput" placeholder="Enter Password" 
                class="w-full bg-gray-900 border border-gray-600 rounded px-4 py-3 mb-4 text-white focus:border-indigo-500 outline-none transition-colors">
            <button onclick="app.login()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded transition-colors shadow-lg">
                Unlock Editor
            </button>
            <p id="loginError" class="text-red-400 mt-4 text-sm hidden"></p>
            <button onclick="window.location.hash = '';" class="mt-6 text-sm text-gray-500 hover:text-white transition-colors">Return to Public Site</button>
        </div>
    </div>

    <!-- Main App Container -->
    <div id="appContainer" class="flex flex-col min-h-screen">
        
        <!-- Navigation -->
        <nav class="bg-gray-800 border-b border-gray-700 sticky top-0 z-40 shadow-xl">
            <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center gap-4">
                
                <!-- Title & Menu -->
                <div class="flex items-center gap-4 sm:gap-6 flex-shrink-0">
                    <div class="flex items-center gap-2 sm:gap-3">
                        <button onclick="app.toggleSidebar()" class="text-gray-400 hover:text-white transition-colors mr-1 outline-none">
                            <i class="fa-solid fa-bars text-lg sm:text-xl"></i>
                        </button>
                        <img id="siteIcon" src="https://i.imgur.com/1h28KPo.png" alt="MWR Logo" class="w-5 h-5 sm:w-6 sm:h-6 object-contain drop-shadow-[0_0_8px_rgba(234,179,8,0.3)] transition-all">
                        <span id="siteTitle" class="font-bold text-lg sm:text-xl tracking-wide hidden sm:inline">MWR Information</span>
                    </div>
                </div>

                <!-- Controls -->
                <div class="flex gap-3 sm:gap-4 items-center justify-end">
                    <a id="discordBtn" href="https://dsc.gg/legion-mw" target="_blank" class="bg-[#5865F2] hover:bg-[#4752C4] text-white p-1.5 rounded-full transition-colors w-8 h-8 sm:w-9 sm:h-9 flex items-center justify-center shadow-lg flex-shrink-0" title="Join our Discord">
                        <i class="fa-brands fa-discord text-sm sm:text-base"></i>
                    </a>

                    <!-- Admin Edit Page Button -->
                    <button id="btnEditPage" onclick="app.enableEditor()" class="hidden bg-indigo-600 hover:bg-indigo-500 text-white px-4 py-1.5 sm:py-2 rounded-lg transition-colors text-xs sm:text-sm font-bold shadow-lg flex-shrink-0">
                        <i class="fa-solid fa-pen-to-square mr-1.5"></i> Edit Page
                    </button>

                    <!-- Exit Admin Button -->
                    <button id="btnExitAdmin" onclick="window.location.hash = '';" class="hidden bg-gray-600 hover:bg-gray-500 text-white p-1.5 sm:px-3 sm:py-2 rounded-lg transition-colors flex items-center justify-center shadow-lg flex-shrink-0" title="Exit Admin">
                        <i class="fa-solid fa-right-from-bracket text-xs sm:text-sm lg:mr-1.5"></i>
                        <span class="hidden lg:inline text-xs font-bold">Exit</span>
                    </button>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="max-w-5xl mx-auto px-4 py-8 sm:py-12 w-full flex-grow relative z-0">
            
            <div id="loading" class="text-center py-16">
                <i class="fas fa-circle-notch fa-spin text-4xl text-indigo-500 mb-3" id="loadingSpinner"></i>
                <p class="text-gray-400 text-sm animate-pulse" id="loadingText">Loading Information...</p>
            </div>

            <!-- PUBLIC VIEW: Tailwind Typography Prose Container -->
            <!-- The 'prose-invert' class makes standard HTML look amazing in dark mode! -->
            <article id="contentViewer" class="hidden prose prose-invert prose-indigo prose-img:rounded-xl prose-a:text-indigo-400 max-w-none w-full bg-gray-800/40 p-6 sm:p-10 rounded-2xl border border-gray-700/50 shadow-2xl">
                <!-- Data injected here -->
            </article>

            <!-- ADMIN VIEW: Rich Text Editor Wrapper -->
            <div id="editorWrapper" class="hidden bg-gray-100 text-gray-900 rounded-2xl overflow-hidden shadow-2xl flex flex-col border border-gray-300">
                <div class="bg-gray-200 p-4 border-b border-gray-300 flex justify-between items-center">
                    <h3 class="font-bold text-gray-800 text-sm uppercase tracking-wider"><i class="fa-solid fa-pen-nib mr-2"></i> Page Editor</h3>
                    <div class="flex gap-2">
                        <button onclick="app.cancelEditor()" class="px-4 py-1.5 bg-gray-400 hover:bg-gray-500 text-white text-xs font-bold rounded transition-colors">Cancel</button>
                        <button onclick="app.saveInfo()" id="btnSaveInfo" class="px-4 py-1.5 bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-bold rounded shadow-md transition-colors">Save & Publish</button>
                    </div>
                </div>
                
                <!-- The Quill Editor binds to this div -->
                <div id="quillEditor" class="bg-white" style="min-height: 500px; font-size: 16px;"></div>
            </div>

        </main>
        
        <footer class="bg-gray-800 border-t border-gray-700 py-6 text-center text-gray-500 text-sm mt-auto">
            <p>MWR Tierlist! Built by the Legion Community</p>
        </footer>
    </div>

    <script>
        const app = (() => {
            const API_URL = "https://script.google.com/macros/s/AKfycbyNcCFpZaPBG4vOFPCJjO7Wg3z6m0FcHwKR1tRRbvK9D5cPKY2OBpKYtnx-86mQnKSz/exec"; 
            
            let isAdmin = false;
            let authToken = "";
            let rawHtmlContent = "";
            let quillInstance = null;

            const init = () => {
                window.addEventListener('hashchange', handleRoute);
                handleRoute();
            };

            const handleRoute = () => {
                const isHashAdmin = window.location.hash === '#admin';
                const appContainer = document.getElementById('appContainer');
                const loginScreen = document.getElementById('loginScreen');

                if (isHashAdmin && !isAdmin) {
                    const saved = sessionStorage.getItem('mw_admin_pass');
                    if(saved) {
                        document.getElementById('passwordInput').value = saved;
                        login();
                    } else {
                        appContainer.classList.add('hidden');
                        loginScreen.classList.remove('hidden');
                    }
                } else if (!isHashAdmin) {
                    // Public Mode
                    isAdmin = false;
                    appContainer.classList.remove('hidden');
                    loginScreen.classList.add('hidden');
                    
                    document.getElementById('btnEditPage').classList.add('hidden');
                    document.getElementById('btnExitAdmin').classList.add('hidden');
                    document.getElementById('discordBtn').classList.remove('hidden');
                    
                    const siteIcon = document.getElementById('siteIcon');
                    if (siteIcon) siteIcon.className = "w-5 h-5 sm:w-6 sm:h-6 object-contain drop-shadow-[0_0_8px_rgba(234,179,8,0.3)] transition-all";
                    document.getElementById('siteTitle').innerText = "MWR Information";

                    // Ensure we are viewing, not editing
                    cancelEditor();
                    if (!rawHtmlContent) loadData(); 
                } else if (isHashAdmin && isAdmin) {
                    // Already logged in
                    appContainer.classList.remove('hidden');
                    loginScreen.classList.add('hidden');
                    
                    document.getElementById('btnEditPage').classList.remove('hidden');
                    document.getElementById('btnExitAdmin').classList.remove('hidden');
                    document.getElementById('discordBtn').classList.add('hidden');
                    
                    if (!rawHtmlContent) loadData();
                }
            };

            const loadData = async () => {
                const loadingEl = document.getElementById('loading');
                const viewerEl = document.getElementById('contentViewer');
                
                loadingEl.classList.remove('hidden');
                viewerEl.classList.add('hidden');

                try {
                    // Pass the "?view=info" flag to your API
                    const res = await fetch(API_URL + "?view=info");
                    const data = await res.json();
                    
                    rawHtmlContent = data.content || "";
                    viewerEl.innerHTML = rawHtmlContent;
                    
                    loadingEl.classList.add('hidden');
                    viewerEl.classList.remove('hidden');
                } catch(e) {
                    console.error(e);
                    loadingEl.innerHTML = `<p class="text-red-400">Failed to load information page.</p>`;
                }
            };

            // --- ADMIN LOGIN & EDIT LOGIC ---
            const login = async () => {
                const pass = document.getElementById('passwordInput').value.trim();
                const err = document.getElementById('loginError');
                const btn = document.querySelector('#loginScreen button');
                
                if (!pass) return;
                btn.innerText = "Verifying..."; btn.disabled = true;

                try {
                    const res = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "check_auth", password: pass }), redirect: "follow" });
                    const data = await res.json();
                    if (data.error) throw new Error(data.error);

                    isAdmin = true;
                    authToken = pass;
                    sessionStorage.setItem('mw_admin_pass', pass);
                    
                    document.getElementById('btnEditPage').classList.remove('hidden');
                    document.getElementById('btnExitAdmin').classList.remove('hidden');
                    document.getElementById('discordBtn').classList.add('hidden'); 
                    
                    const siteIcon = document.getElementById('siteIcon');
                    if (siteIcon) siteIcon.className = "w-5 h-5 sm:w-6 sm:h-6 object-contain drop-shadow-[0_0_8px_rgba(74,222,128,0.8)] transition-all";
                    document.getElementById('siteTitle').innerText = "Admin Information Editor";

                    document.getElementById('loginScreen').classList.add('hidden');
                    document.getElementById('appContainer').classList.remove('hidden');
                    
                    if (!rawHtmlContent) loadData();

                } catch (e) {
                    err.innerText = "Incorrect Password or Connection Error";
                    err.classList.remove('hidden');
                } finally {
                    btn.innerText = "Unlock Editor"; btn.disabled = false;
                }
            };

            const sendRequest = async (payload) => {
                payload.password = authToken;
                const res = await fetch(API_URL, { method: "POST", body: JSON.stringify(payload), redirect: "follow" });
                const data = await res.json();
                if(data.error) throw new Error(data.error);
                return data;
            };

            // --- QUILL EDITOR LOGIC ---
            const enableEditor = () => {
                if (!isAdmin) return;
                document.getElementById('contentViewer').classList.add('hidden');
                document.getElementById('editorWrapper').classList.remove('hidden');
                document.getElementById('btnEditPage').classList.add('hidden');

                // Initialize Quill only once
                if (!quillInstance) {
                    quillInstance = new Quill('#quillEditor', {
                        theme: 'snow',
                        modules: {
                            toolbar: [
                                [{ 'header': [1, 2, 3, false] }],
                                ['bold', 'italic', 'underline', 'strike'],
                                [{ 'color': [] }, { 'background': [] }],
                                [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                                ['link', 'image', 'video'],
                                ['clean']
                            ]
                        }
                    });
                }
                
                // Load current HTML into editor
                quillInstance.root.innerHTML = rawHtmlContent;
            };

            const cancelEditor = () => {
                document.getElementById('editorWrapper').classList.add('hidden');
                if (rawHtmlContent) {
                    document.getElementById('contentViewer').classList.remove('hidden');
                }
                if (isAdmin) {
                    document.getElementById('btnEditPage').classList.remove('hidden');
                }
            };

            const saveInfo = async () => {
                if (!isAdmin || !quillInstance) return;
                
                const btn = document.getElementById('btnSaveInfo');
                btn.innerText = "Saving..."; btn.disabled = true;

                // Extract HTML content from Quill
                const newHtml = quillInstance.root.innerHTML;

                try {
                    await sendRequest({ action: "save_info", content: newHtml });
                    
                    // Update successful! Update local cache and switch back to viewer
                    rawHtmlContent = newHtml;
                    document.getElementById('contentViewer').innerHTML = rawHtmlContent;
                    cancelEditor();
                } catch(e) {
                    alert("Failed to save the page: " + e.message);
                } finally {
                    btn.innerText = "Save & Publish"; btn.disabled = false;
                }
            };

            const toggleSidebar = () => {
                const sidebar = document.getElementById('sidebar');
                const overlay = document.getElementById('sidebarOverlay');
                if (sidebar.classList.contains('-translate-x-full')) {
                    sidebar.classList.remove('-translate-x-full');
                    overlay.classList.remove('hidden');
                } else {
                    sidebar.classList.add('-translate-x-full');
                    overlay.classList.add('hidden');
                }
            };

            return { init, login, toggleSidebar, enableEditor, cancelEditor, saveInfo };
        })();

        window.onload = app.init;
    </script>
</body>
</html>
