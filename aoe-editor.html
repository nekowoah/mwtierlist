<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MWR | AOE & Aura Editor</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="shared/globals.js"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="shared/styles.css">
    <link rel="icon" href="https://i.imgur.com/1h28KPo.png" type="image/x-icon">

    <style>
        .grid-cell { width: 3rem; height: 3rem; border: 1px solid #4b5563; background-color: #1f2937; cursor: pointer; transition: all 0.2s; }
        .grid-cell:hover { background-color: #374151; }
        .grid-cell.active { background-color: rgba(34, 197, 94, 0.4); border-color: #22c55e; }
        .grid-cell.center-cell { background-color: rgba(59, 130, 246, 0.3); border-color: #3b82f6; position: relative; }
        .grid-cell.center-cell::after { content: '★'; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #60a5fa; font-size: 1rem; }
        
        .checkbox-cell { width: 3rem; height: 2rem; display: flex; align-items: center; justify-content: center; }
        .checkbox-row { width: 2rem; height: 3rem; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans flex flex-col">

    <nav class="bg-gray-800 border-b border-gray-700 sticky top-0 z-40 shadow-xl">
        <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <button onclick="window.AppMenu.toggleSidebar()" class="text-gray-400 hover:text-white transition-colors outline-none"><i class="fa-solid fa-bars text-xl"></i></button>
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-pen-ruler text-yellow-400 text-xl"></i>
                    <span class="font-bold text-xl tracking-wide hidden sm:block">AOE & Aura Configurator</span>
                </div>
            </div>
            <a href="index.html#admin" class="bg-gray-700 hover:bg-gray-600 text-white px-4 py-1.5 rounded text-sm font-bold shadow-lg transition-colors">Back to Admin</a>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-8 w-full flex-grow flex flex-col items-center">
        
        <div class="w-full max-w-md bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-2xl mb-8 fade-in">
            <h2 class="text-xl font-bold text-white mb-4 border-b border-gray-700 pb-2">1. Select Hero</h2>
            <select id="heroSelect" class="w-full bg-gray-900 border border-gray-600 rounded px-4 py-3 text-white focus:border-yellow-500 outline-none font-bold" onchange="app.loadHeroAoe()">
                <option value="">-- Choose a Hero --</option>
            </select>
        </div>

        <div id="editorPanel" class="w-full max-w-md bg-gray-800 p-6 sm:p-8 rounded-xl border border-gray-700 shadow-2xl fade-in opacity-50 pointer-events-none transition-opacity">
            <h2 class="text-xl font-bold text-white mb-2 border-b border-gray-700 pb-2">2. Map AOE & Aura</h2>
            <p class="text-xs text-gray-400 mb-6 leading-relaxed">Click grid squares to highlight specific zones. Check the boxes on the top or left to affect <span class="text-yellow-400 font-bold">infinite rows/columns</span> across the battlefield. Enter a radius for Circular Auras.</p>

            <div class="flex flex-col items-center justify-center gap-1 mb-8 overflow-x-auto">
                <!-- Top Checkboxes (Columns) -->
                <div class="flex gap-1 pl-[2rem]">
                    <div class="checkbox-cell"><input type="checkbox" id="col-2" class="w-4 h-4 accent-yellow-500 cursor-pointer"></div>
                    <div class="checkbox-cell"><input type="checkbox" id="col-1" class="w-4 h-4 accent-yellow-500 cursor-pointer"></div>
                    <div class="checkbox-cell"><input type="checkbox" id="col-0" class="w-4 h-4 accent-yellow-500 cursor-pointer"></div>
                    <div class="checkbox-cell"><input type="checkbox" id="col-1_pos" class="w-4 h-4 accent-yellow-500 cursor-pointer"></div>
                    <div class="checkbox-cell"><input type="checkbox" id="col-2_pos" class="w-4 h-4 accent-yellow-500 cursor-pointer"></div>
                </div>

                <!-- Grid Rows + Side Checkboxes -->
                <div class="flex flex-col gap-1" id="aoeGridContainer">
                    <!-- Injected by JS -->
                </div>
            </div>

            <!-- Global Settings & Radius -->
            <div class="bg-gray-900/50 p-4 rounded-lg border border-gray-700 mb-6 flex flex-col gap-4">
                <label class="flex items-center gap-3 cursor-pointer group">
                    <input type="checkbox" id="wholeFormation" class="w-5 h-5 accent-yellow-500 cursor-pointer">
                    <span class="text-sm font-bold text-gray-300 group-hover:text-white transition-colors">Affects Whole Formation</span>
                </label>
                
                <div class="flex items-center gap-3 border-t border-gray-700 pt-4">
                    <span class="text-sm font-bold text-gray-300">Circular Aura Radius:</span>
                    <input type="number" id="auraRadius" min="0" max="50" step="1" value="0" class="w-20 bg-gray-900 border border-gray-600 rounded px-2 py-1 text-white text-center font-bold outline-none focus:border-yellow-500">
                    <span class="text-xs text-gray-500 italic">(10 = 1 Grid Space)</span>
                </div>
            </div>

            <button onclick="app.saveAoe()" id="btnSave" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3 rounded-lg shadow-lg transition-colors flex justify-center items-center gap-2">
                <i class="fa-solid fa-cloud-arrow-up"></i> Save Configuration
            </button>
        </div>

    </main>

    <script>
        const app = (() => {
            const { API_URL } = window.MWR_GLOBALS;
            let authToken = "";
            let heroes = [];
            let aoeData = [];

            const init = async () => {
                const savedToken = sessionStorage.getItem('mw_admin_token');
                if(!savedToken) { window.location.href = 'admin.html'; return; }
                authToken = savedToken;

                if (window.AppMenu) window.AppMenu.build(true, 'yellow');
                buildGrid();

                try {
                    const res = await fetch(API_URL + "?view=all");
                    heroes = await res.json();
                    
                    const select = document.getElementById('heroSelect');
                    heroes.sort((a,b) => a.name.localeCompare(b.name)).forEach(h => {
                        const opt = document.createElement('option');
                        opt.value = h.id; opt.innerText = h.name;
                        select.appendChild(opt);
                    });

                    const aoeRes = await fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "get_aoe" }) });
                    aoeData = await (await aoeRes).json() || [];

                } catch(e) { alert("Failed to load. " + e.message); }
            };

            const buildGrid = () => {
                const container = document.getElementById('aoeGridContainer');
                let html = '';
                for(let r = -2; r <= 2; r++) {
                    let rowHtml = `<div class="flex gap-1 items-center">`;
                    // Left Checkbox
                    const rowId = r < 0 ? `row${r}` : `row-${r}_pos`; // Unique ID encoding
                    rowHtml += `<div class="checkbox-row pr-2"><input type="checkbox" id="${rowId}" class="w-4 h-4 accent-yellow-500 cursor-pointer"></div>`;
                    
                    for(let c = -2; c <= 2; c++) {
                        const isCenter = r===0 && c===0;
                        rowHtml += `<div class="grid-cell ${isCenter?'center-cell':''}" id="cell_${r}_${c}" onclick="app.toggleCell(${r},${c})"></div>`;
                    }
                    rowHtml += `</div>`;
                    html += rowHtml;
                }
                container.innerHTML = html;
            };

            const toggleCell = (r, c) => {
                if(r===0 && c===0) return; // Center is always hero
                document.getElementById(`cell_${r}_${c}`).classList.toggle('active');
            };

            const loadHeroAoe = () => {
                const heroId = document.getElementById('heroSelect').value;
                const panel = document.getElementById('editorPanel');
                
                if (!heroId) { panel.classList.add('opacity-50', 'pointer-events-none'); return; }
                panel.classList.remove('opacity-50', 'pointer-events-none');

                // Reset all inputs
                document.querySelectorAll('.grid-cell').forEach(c => c.classList.remove('active'));
                document.querySelectorAll('input[type="checkbox"]').forEach(c => c.checked = false);
                document.getElementById('auraRadius').value = "0";

                const data = aoeData.find(a => a.heroId === heroId);
                if (data) {
                    if(data.grid) data.grid.forEach(coord => {
                        const cell = document.getElementById(`cell_${coord[0]}_${coord[1]}`);
                        if(cell) cell.classList.add('active');
                    });
                    
                    if(data.fullRows) data.fullRows.forEach(r => {
                        const id = r < 0 ? `row${r}` : `row-${r}_pos`;
                        if(document.getElementById(id)) document.getElementById(id).checked = true;
                    });
                    
                    if(data.fullCols) data.fullCols.forEach(c => {
                        const id = c < 0 ? `col${c}` : `col-${c}_pos`;
                        if(document.getElementById(id)) document.getElementById(id).checked = true;
                    });

                    document.getElementById('wholeFormation').checked = data.wholeFormation || false;
                    document.getElementById('auraRadius').value = data.radius || 0;
                }
            };

            const saveAoe = async () => {
                const heroId = document.getElementById('heroSelect').value;
                if(!heroId) return;

                const btn = document.getElementById('btnSave');
                btn.innerHTML = `<i class="fas fa-spinner fa-spin"></i> Saving...`; btn.disabled = true;

                const grid = [];
                for(let r = -2; r <= 2; r++) {
                    for(let c = -2; c <= 2; c++) {
                        if(r===0 && c===0) continue;
                        if(document.getElementById(`cell_${r}_${c}`).classList.contains('active')) grid.push([r,c]);
                    }
                }

                const fullRows = [];
                for(let r = -2; r <= 2; r++) {
                    const id = r < 0 ? `row${r}` : `row-${r}_pos`;
                    if(document.getElementById(id).checked) fullRows.push(r);
                }

                const fullCols = [];
                for(let c = -2; c <= 2; c++) {
                    const id = c < 0 ? `col${c}` : `col-${c}_pos`;
                    if(document.getElementById(id).checked) fullCols.push(c);
                }

                const payload = {
                    action: "save_aoe",
                    token: authToken,
                    data: {
                        heroId: heroId,
                        grid: grid,
                        fullRows: fullRows,
                        fullCols: fullCols,
                        wholeFormation: document.getElementById('wholeFormation').checked,
                        radius: Number(document.getElementById('auraRadius').value) || 0
                    }
                };

                try {
                    await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
                    
                    // Update local state
                    const existingIdx = aoeData.findIndex(a => a.heroId === heroId);
                    if(existingIdx >= 0) aoeData[existingIdx] = payload.data;
                    else aoeData.push(payload.data);

                    btn.innerHTML = `<i class="fa-solid fa-check"></i> Saved!`;
                    btn.classList.replace('bg-green-600', 'bg-blue-600');
                    setTimeout(() => {
                        btn.innerHTML = `<i class="fa-solid fa-cloud-arrow-up"></i> Save Configuration`;
                        btn.classList.replace('bg-blue-600', 'bg-green-600');
                        btn.disabled = false;
                    }, 2000);
                } catch(e) {
                    alert("Save failed: " + e.message);
                    btn.innerText = "Save Configuration"; btn.disabled = false;
                }
            };

            return { init, toggleCell, loadHeroAoe, saveAoe };
        })();
        window.onload = app.init;
    </script>
</body>
</html>
